# Canonical golangci-lint config for leartech Go services.
#
# Consumers don't edit this file directly. The go-lint pipeline task
# (tasks/go-lint/pullrequest.yaml) curls it at CI time and yq-merges it
# with each repo's own .golangci.yml, which carries only the per-repo
# override (goimports.local-prefixes).
#
# Local dev mirrors the same merge via `make lint` (see template Makefile).
#
# Linter additions / rule tweaks land HERE first, then propagate to every
# Go consumer with zero per-repo churn.
run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - prealloc
    - gocritic
    - gosec
    - revive
    - nolintlint

linters-settings:
  gosec:
    # G104: unhandled errors — errcheck covers this better
    excludes:
      - G104
  revive:
    rules:
      - name: exported
      - name: package-comments
      - name: var-naming
      - name: indent-error-flow

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0
