# Canonical golangci-lint v2 config for leartech Go services.
#
# Consumers don't edit this file directly. The go-lint pipeline task
# (tasks/go-lint/pullrequest.yaml) curls it at CI time and yq-merges it
# with each repo's own .golangci.yml, which carries only the per-repo
# override (formatters.settings.goimports.local-prefixes).
#
# Local dev mirrors the same merge via `make lint-config` + `make lint`.
#
# Linter additions / rule tweaks land HERE first, then propagate to every
# Go consumer with zero per-repo churn.
#
# NOTE: Do NOT put `version: "2"` here. Per-repo .golangci.yml sets it.
# If the base also sets it, yq merge + viper unmarshal can choke.

run:
  timeout: 5m
  tests: true

output:
  formats:
    text:
      path: stdout

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - prealloc
    - gocritic
    - gosec
    - revive
    - nolintlint

  settings:
    gosec:
      # G104: unhandled errors — errcheck covers this better
      config:
        G104:
          - ".*"
    revive:
      rules:
        - name: exported
        - name: package-comments
        - name: var-naming
        - name: indent-error-flow

  exclusions:
    warn-unused: true
    # 'lax' detects generated files via permissive markers (covers swag's
    # "GENERATED BY SWAG; DO NOT EDIT" which doesn't match the strict
    # "Code generated ... DO NOT EDIT." regex gocritic enforces by default).
    generated: lax
    rules:
      - path: '_test\.go'
        linters:
          - gosec
          - errcheck
    max-issues-per-linter: 0
    max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
