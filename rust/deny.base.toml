# Canonical cargo-deny base policy for leartech Rust services.
#
# Consumers don't edit this file directly. The rust-audit pipeline task
# (tasks/rust-audit/pullrequest.yaml) curls it at CI time when the consumer
# repo doesn't ship its own `deny.toml`.
#
# Repo-local overrides win — drop a `deny.toml` at the repo root and this
# file is ignored entirely. Use the override sparingly; new policy belongs
# HERE so it propagates to every Rust consumer with zero per-repo churn.

[graph]
# Build for the platforms our services actually run on (Linux x86_64).
# Adding aarch64 once the cluster has ARM nodes.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
]

# ---------------------------------------------------------------------------
# Advisories — RustSec advisory DB (vulnerabilities, unmaintained, yanked)
# ---------------------------------------------------------------------------
[advisories]
db-path = "~/.cargo/advisory-dbs"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = []

# ---------------------------------------------------------------------------
# Licenses — explicit allow-list. Anything else fails the build.
# Add to the allow list ONLY after a license review.
# ---------------------------------------------------------------------------
[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
]
confidence-threshold = 0.93
exceptions = []

# ---------------------------------------------------------------------------
# Bans — duplicate detection + explicit deny list for crates we don't want
# in the dep graph (e.g. legacy openssl, abandoned forks).
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

# ---------------------------------------------------------------------------
# Sources — only allow crates from crates.io and github.com/mikelear (for
# git deps to leartech-rust-common before a private cargo registry exists).
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/mikelear/leartech-rust-common",
]
