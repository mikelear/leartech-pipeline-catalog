# Test the static security scan against pipeline-test namespace
# Usage: kubectl apply -f test/taskrun-static-scan.yaml
# Check: kubectl logs -n pipeline-test static-scan-test -f
apiVersion: v1
kind: Pod
metadata:
  name: static-scan-test
  namespace: pipeline-test
spec:
  restartPolicy: Never
  activeDeadlineSeconds: 300
  containers:
  - name: scanner
    image: ghcr.io/mikelear/security-tools:latest
    command:
    - /app/static-scan.sh
    args:
    - --source-dir
    - /test-data
    - --cluster-id
    - test
    - --repo
    - mikelear/future-lending-ui
    - --pr
    - "0"
    - --token
    - ""
    volumeMounts:
    - name: test-data
      mountPath: /test-data
  volumes:
  - name: test-data
    configMap:
      name: test-data
