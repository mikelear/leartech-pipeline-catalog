# Python PR pipeline for services that opt OUT of preview-deploy.
#
# Why this task exists
# ====================
# Some Python services expose internal APIs to other platform services
# (e.g. MCP SSE endpoints consumed by orch + agent) rather than to end
# users. Those services have no need for a preview environment.
#
# Worse, services that need cluster-scoped Helm resources (ClusterRole,
# ClusterRoleBinding — common for anything that needs cluster-wide read
# access like a k8s-mcp) hit a hard ownership-conflict problem with the
# upstream `jx preview create` flow:
#
#   1. PR #N opens → preview helm-install creates `<chart>-<role>`
#      ClusterRole/ClusterRoleBinding. Cluster-scoped resources do NOT
#      get GC'd when the preview namespace is torn down.
#   2. PR #N closes → namespace deleted, ClusterRole orphaned.
#   3. PR #N+1 opens → preview helm-install tries to create the same
#      cluster-scoped resources → "already exists; cannot be imported"
#      → preview-deploy fails → every subsequent PR red on `pr`.
#
# Captured as memory id=9 (preview_helm_install_cluster_role_orphan),
# surfaced during platform-mcps PR #12/#13 dogfood (2026-06-12).
#
# The durable fix for these services is to skip preview-deploy at the
# pipeline level: keep every quality gate (lint, tests, kaniko image
# build, image-scan via grype, ai-review, security-scan via semgrep +
# gitleaks) but stop short of `jx preview create`.
#
# What this task DOES
# ===================
#   1. git-clone-pr   — fetch PR head into /workspace/source
#   2. jx-variables   — populate .jx/variables.sh (VERSION etc.)
#   3. build-python-test — uv sync, ruff format --check, ruff check,
#                           pytest with coverage (mirrors python/release.yaml)
#   4. build-container-build — kaniko build of the service's Dockerfile,
#                              pushed to PUSH_CONTAINER_REGISTRY. Proves
#                              the image builds cleanly so the eventual
#                              release pipeline doesn't fail blind.
#
# What this task explicitly does NOT do
# =====================================
#   - No `jx preview create` step
#   - No `helm install`/`helm upgrade` against a preview namespace
#   - No promote-jx-preview
#
# AI review, static security scan (semgrep + gitleaks), and image scan
# (grype) remain SEPARATE pipelines wired up by the consumer repo's
# .lighthouse/jenkins-x/triggers.yaml — they are unaffected by this task.
#
# Adopting repos
# ==============
#   - leartech-platform-mcps  (canonical consumer; k8s-mcp ClusterRole)
#
# Future Python services with cluster-scoped Helm resources OR
# internal-only consumers should point their `pr` trigger at this task
# instead of `python/pullrequest.yaml`. See tasks/python-build-only/README.md.
#
# Mirrors the step structure of tasks/python/release.yaml (build-python-test
# + build-container-build) and tasks/go/pullrequest.yaml (PR-CI kaniko
# pattern without ghcr.io auth).
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: pullrequest
spec:
  pipelineSpec:
    tasks:
    - name: from-build-pack
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          # Pod-level scheduling is sum of all step container requests
          # (Tekton steps run sequentially but reservations are upfront).
          # Keep modest so the pod fits on a standard AKS/GKE node.
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - image: ghcr.io/jenkins-x/jx-boot:3.17.6
          name: jx-variables
          resources: {}
          script: |
            #!/usr/bin/env sh
            jx gitops variables
        - image: python:3.14-slim
          name: build-python-test
          resources: {}
          # `set -e` is mandatory — without it, a non-zero exit from
          # ruff/pytest is swallowed by the shell and the step reports
          # success even when the tests failed. Captured as memory
          # `feedback_pr_pytest_step_must_set_e`.
          script: |
            #!/bin/sh
            set -e
            pip install uv --quiet
            # Frozen install preferred; fall back to a fresh resolve if
            # the lockfile lags (e.g. first build after dep bump on main).
            uv sync --dev --frozen --no-cache 2>/dev/null || uv sync --dev --no-cache
            # Lint + format check. Consumer repos that don't use ruff
            # can skip by removing these two lines via a fork of this
            # task, but the platform default is ruff for any python service.
            uv run ruff format --check .
            uv run ruff check .
            # Unit + integration tests with coverage. pytest exit code
            # propagates via `set -e`.
            uv run coverage run -m pytest -v
            uv run coverage report
        - image: gcr.io/kaniko-project/executor:v1.24.0-debug
          name: build-container-build
          resources: {}
          # PR-CI kaniko pattern: no ghcr.io auth. The consumer Dockerfile
          # must use a public base image (e.g. python:3.13-slim) so kaniko
          # can pull without credentials. If the consumer's Dockerfile uses
          # `ARG BASE_IMAGE` the build-arg below pins it to a known-good
          # public default; otherwise the ARG is silently ignored.
          # Matches tasks/go/pullrequest.yaml's auth-free kaniko shape.
          script: |
            #!/busybox/sh
            set -e
            source .jx/variables.sh
            cp /tekton/creds/.docker/config.json /kaniko/.docker/config.json
            # Layer cache shared with release builds — PR snapshots warm
            # the cache for the eventual release build of the merged commit.
            # See tasks/python/release.yaml for rationale.
            /kaniko/executor $KANIKO_FLAGS \
              --cache=true \
              --cache-repo="$PUSH_CONTAINER_REGISTRY/$DOCKER_REGISTRY_ORG/kaniko-cache" \
              --cache-ttl=168h \
              --build-arg "BASE_IMAGE=python:3.13-slim" \
              --context=/workspace/source \
              --dockerfile="${DOCKERFILE_PATH:-Dockerfile}" \
              --destination="$PUSH_CONTAINER_REGISTRY/$DOCKER_REGISTRY_ORG/$APP_NAME:$VERSION"
        # NB: no promote-jx-preview step here — by design. See file header.
  podTemplate:
    tolerations:
    - key: sku
      operator: Equal
      value: build
      effect: NoSchedule
  serviceAccountName: tekton-bot
  timeout: 2h0m0s
status: {}
