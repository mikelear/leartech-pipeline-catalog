apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: dotnet-audit
spec:
  pipelineSpec:
    tasks:
    - name: dotnet-audit
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - image: mcr.microsoft.com/dotnet/sdk:9.0
          name: dotnet-audit
          resources:
            requests:
              cpu: 400m
              memory: 1Gi
          env:
            # GitHub Packages NuGet feed credentials — nuget.config references
            # these as %GITHUB_USER% / %GITHUB_TOKEN%. Without them `dotnet
            # restore` 401s on any Leartech.* / Mqube.* PackageReference.
            # `optional: true` keeps services with only nuget.org deps working.
            - name: GITHUB_USER
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: username
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: password
                  optional: true
          script: |
            #!/bin/bash
            set -e
            apt-get update -qq && apt-get install -y -qq --no-install-recommends \
              git make ca-certificates >/dev/null

            SOLUTION="${BUILD_TARGET:-./*.sln}"

            echo "==> dotnet restore $SOLUTION"
            dotnet restore $SOLUTION --locked-mode

            # `dotnet list package --vulnerable --include-transitive` is the
            # built-in NuGet advisory check. Output goes to stdout; we grep
            # for known severity markers and fail on Critical/High by default.
            # Set DOTNET_VULN_FAIL_ON=Moderate (or Low) to tighten.
            FAIL_ON="${DOTNET_VULN_FAIL_ON:-High}"
            echo "==> dotnet list package --vulnerable --include-transitive (fail on >=$FAIL_ON)"
            VULN_OUTPUT=$(dotnet list $SOLUTION package --vulnerable --include-transitive 2>&1 || true)
            echo "$VULN_OUTPUT"

            # Levels are emitted as "Severity" column: Critical/High/Moderate/Low.
            # Build the regex from the threshold downward.
            case "$FAIL_ON" in
              Critical) REGEX='Critical' ;;
              High) REGEX='Critical|High' ;;
              Moderate) REGEX='Critical|High|Moderate' ;;
              Low) REGEX='Critical|High|Moderate|Low' ;;
              *) REGEX='Critical|High' ;;
            esac

            if echo "$VULN_OUTPUT" | grep -E "$REGEX" >/dev/null; then
              echo "FAIL: vulnerable packages at or above $FAIL_ON severity"
              exit 1
            fi

            # Deprecated package surfacing — informational only by default.
            # Set DOTNET_FAIL_ON_DEPRECATED=true to gate (most teams don't —
            # deprecated ≠ vulnerable, just maintained-elsewhere).
            echo "==> dotnet list package --deprecated --include-transitive (informational)"
            DEPRECATED_OUTPUT=$(dotnet list $SOLUTION package --deprecated --include-transitive 2>&1 || true)
            echo "$DEPRECATED_OUTPUT"

            if [ "${DOTNET_FAIL_ON_DEPRECATED:-false}" = "true" ]; then
              if echo "$DEPRECATED_OUTPUT" | grep -E '> [^[:space:]]+ ' >/dev/null; then
                echo "FAIL: deprecated packages found and DOTNET_FAIL_ON_DEPRECATED=true"
                exit 1
              fi
            fi

            echo "==> audit complete"
  podTemplate:
    tolerations:
    - key: sku
      operator: Equal
      value: build
      effect: NoSchedule
  serviceAccountName: tekton-bot
  timeout: 30m0s
status: {}
