apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: rust-lint
spec:
  pipelineSpec:
    tasks:
    - name: rust-lint
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - image: rust:1.95-slim-bookworm
          name: rust-lint
          resources:
            requests:
              cpu: 400m
              memory: 1Gi
          script: |
            #!/bin/bash
            set -e
            apt-get update -qq && apt-get install -y -qq --no-install-recommends \
              git pkg-config libssl-dev libpq-dev build-essential >/dev/null

            # rustfmt + clippy ship with the rust:slim image's default toolchain
            # via `rustup component add` (already present unless rust-toolchain.toml
            # pins a non-default channel — handled by rustup automatically when it
            # reads that file).
            rustup component add rustfmt clippy

            echo "==> cargo fmt --all -- --check"
            cargo fmt --all -- --check

            echo "==> cargo clippy --all-targets --all-features -- -D warnings"
            # -D warnings = clippy treats every warning as an error. Matches
            # the leartech-rust-common gate; services should be just as strict.
            cargo clippy --all-targets --all-features --locked -- -D warnings

            echo "==> lint complete"
  podTemplate:
    tolerations:
    - key: sku
      operator: Equal
      value: build
      effect: NoSchedule
  serviceAccountName: tekton-bot
  timeout: 30m0s
status: {}
