# .NET release orchestrator. Composes language-agnostic release/* steps
# with the .NET build stage. Target: thin — every step is either a `uses:`
# reference to a reusable task or a single .NET-specific script block.
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: release
spec:
  pipelineSpec:
    tasks:
    - name: from-build-pack
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone.yaml@versionStream
          name: ""
          resources: {}
        - image: uses:mikelear/leartech-pipeline-catalog/tasks/release/next-version.yaml@main
          name: ""
          resources: {}
        - image: ghcr.io/jenkins-x/jx-boot:3.17.50
          name: jx-variables
          resources: {}
          script: |
            #!/usr/bin/env sh
            jx gitops variables
        # mcr.microsoft.com/dotnet/sdk:9.0 — switch to leartech-dotnet-runtime
        # once that image is published (PR mikelear/leartech-dockerfiles#16).
        - image: mcr.microsoft.com/dotnet/sdk:9.0
          name: build-dotnet-publish
          resources:
            requests:
              cpu: 400m
              memory: 1Gi
          env:
            # GitHub Packages NuGet feed credentials — nuget.config references
            # these as %GITHUB_USER% / %GITHUB_TOKEN%. Without them `dotnet
            # restore` 401s on any Leartech.* / Mqube.* PackageReference.
            # `optional: true` keeps services with only nuget.org deps working.
            - name: GITHUB_USER
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: username
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: password
                  optional: true
          script: |
            #!/bin/bash
            set -e
            apt-get update -qq && apt-get install -y -qq --no-install-recommends \
              git make ca-certificates >/dev/null

            SOLUTION="${BUILD_TARGET:-./*.sln}"
            echo "==> dotnet restore $SOLUTION"
            dotnet restore $SOLUTION --locked-mode

            # Release-mode optimised publish. Version flows through MSBuild via
            # /p:Version=$VERSION so the assemblies + nupkgs are stamped with
            # the same semver as the cluster-suffix git tag.
            source .jx/variables.sh
            echo "==> dotnet publish (Release, version=$VERSION)"
            dotnet publish $SOLUTION \
              --no-restore \
              --configuration Release \
              /p:Version=$VERSION \
              -o ./publish

            # Optional Makefile hook (mirrors go's `make swag` + rust's
            # `make openapi`): regenerates docs/<Assembly>.json via the
            # service's `openapi:` target so the spec lands in the same
            # pod for openapi-generation to read after this task.
            # Non-fatal: skip silently if no Makefile or no target.
            [ -f Makefile ] && grep -q "^openapi:" Makefile && make openapi || true
        - image: gcr.io/kaniko-project/executor:v1.24.0-debug
          name: build-container-build
          resources: {}
          env:
            # Pass GitHub Packages credentials into the build context so the
            # Dockerfile's `ARG GITHUB_USER` / `ARG GITHUB_TOKEN` resolve to
            # real values when restoring private NuGet packages (e.g. peer
            # SDK PackageReferences). `optional: true` keeps services with
            # only public nuget.org deps building unchanged.
            - name: GITHUB_USER
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: username
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: password
                  optional: true
          script: |
            #!/busybox/sh
            source .jx/variables.sh
            cp /tekton/creds/.docker/config.json /kaniko/.docker/config.json
            /kaniko/executor $KANIKO_FLAGS \
              --cache=true \
              --cache-repo="$PUSH_CONTAINER_REGISTRY/$DOCKER_REGISTRY_ORG/kaniko-cache" \
              --cache-ttl=168h \
              --build-arg "GITHUB_USER=${GITHUB_USER}" \
              --build-arg "GITHUB_TOKEN=${GITHUB_TOKEN}" \
              --context=/workspace/source \
              --dockerfile="${DOCKERFILE_PATH:-Dockerfile}" \
              --destination="$PUSH_CONTAINER_REGISTRY/$DOCKER_REGISTRY_ORG/$APP_NAME:$VERSION"
        - image: uses:mikelear/leartech-pipeline-catalog/tasks/release/promote-cluster-suffixed.yaml@main
          name: ""
          resources: {}
        - image: uses:mikelear/leartech-pipeline-catalog/tasks/release/helm-release.yaml@main
          name: ""
          resources: {}
        - image: uses:mikelear/leartech-pipeline-catalog/tasks/release/cosign-sign.yaml@main
          name: ""
          resources: {}
        - image: uses:mikelear/leartech-pipeline-catalog/tasks/release/jx-promote.yaml@main
          name: ""
          resources: {}
  podTemplate:
    tolerations:
    - key: sku
      operator: Equal
      value: build
      effect: NoSchedule
  serviceAccountName: tekton-bot
  timeout: 12h0m0s
status: {}
