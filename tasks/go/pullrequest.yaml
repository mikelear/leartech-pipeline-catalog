apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: pullrequest
spec:
  pipelineSpec:
    tasks:
    - name: from-build-pack
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          # Pod-level scheduling is sum of all step containers (Tekton steps
          # run sequentially but reserved up-front). Keep modest so the pod
          # fits on a standard node.
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - image: ghcr.io/jenkins-x/jx-boot:3.16.59
          name: jx-variables
          resources: {}
          script: |
            #!/usr/bin/env sh
            jx gitops variables
        - image: golang:1.25-alpine
          name: build-make-build
          resources: {}
          script: |
            #!/bin/sh
            set -e
            apk add --no-cache git make
            # Populate module cache. If the repo has private deps via
            # leartech-go-common or similar, make the dep repo public
            # (preferred) or inline an override step that sets GIT_TOKEN +
            # GOPRIVATE before this step runs.
            go mod download
            # Regenerate OpenAPI docs via swaggo/swag if the Makefile has a
            # `swag:` target. No-op otherwise — services without Swagger just
            # skip this.
            [ -f Makefile ] && grep -q "^swag:" Makefile && make swag || true
            # BUILD_TARGET lets monorepos point at a non-default entrypoint.
            # Default matches the golden-standard layout (cmd/server/main.go).
            go build -trimpath -ldflags="-s -w" -o bin/server "${BUILD_TARGET:-./cmd/server}"
        - image: gcr.io/kaniko-project/executor:v1.9.1-debug
          name: build-container-build
          resources: {}
          script: |
            #!/busybox/sh
            source .jx/variables.sh
            cp /tekton/creds/.docker/config.json /kaniko/.docker/config.json
            # Layer cache — see release.yaml for rationale. Same cache repo
            # shared across PR + release builds, so PR snapshots warm the cache
            # for the eventual release build of the merged commit.
            /kaniko/executor $KANIKO_FLAGS \
              --cache=true \
              --cache-repo="$PUSH_CONTAINER_REGISTRY/$DOCKER_REGISTRY_ORG/kaniko-cache" \
              --cache-ttl=168h \
              --cache-copy-layers=true \
              --context=/workspace/source \
              --dockerfile="${DOCKERFILE_PATH:-Dockerfile}" \
              --destination="$PUSH_CONTAINER_REGISTRY/$DOCKER_REGISTRY_ORG/$APP_NAME:$VERSION"
        - image: ghcr.io/jenkins-x/jx-boot:3.16.59
          name: promote-jx-preview
          resources: {}
          script: |
            #!/usr/bin/env sh
            set -e
            source .jx/variables.sh
            # DOCKER_REGISTRY_ORG is read from .jx/variables.sh directly.
            # jx-preview v0.7.3+ dropped the --docker-register-org flag.
            jx preview create
  podTemplate:
    tolerations:
    - key: sku
      operator: Equal
      value: build
      effect: NoSchedule
  serviceAccountName: tekton-bot
  timeout: 2h0m0s
status: {}
