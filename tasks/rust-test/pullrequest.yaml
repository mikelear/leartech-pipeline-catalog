apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: rust-test
spec:
  pipelineSpec:
    tasks:
    - name: rust-test
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          - name: CLUSTER_ID
            valueFrom:
              configMapKeyRef:
                name: jx-cluster-config
                key: CLUSTER_ID
                optional: true
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - image: rust:1.95-slim-bookworm
          name: rust-test
          resources:
            requests:
              cpu: 400m
              memory: 1Gi
          env:
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: password
                  optional: true
          script: |
            #!/bin/bash
            set -eo pipefail

            # Consumer-overridable via env:
            #   COVERAGE_THRESHOLD — minimum acceptable line coverage % (default 60)
            THRESHOLD="${COVERAGE_THRESHOLD:-60.0}"

            apt-get update -qq && apt-get install -y -qq --no-install-recommends \
              git make pkg-config libssl-dev libpq-dev build-essential jq curl >/dev/null

            # Install nextest + llvm-cov via cargo install --locked. Cold ~3 min.
            # TODO: pre-bake into a `leartech-rust-tools` image to drop install
            # time to seconds. cargo-binstall would also help but the curl-pipe
            # install path doesn't pass the leartech security gate.
            #
            # Versions pinned to the last release that supports rustc 1.88
            # (our current MSRV). cargo-nextest 0.9.133+ requires 1.91; bump
            # this pin when the toolchain bumps.
            echo "==> installing cargo-nextest@0.9.114 + cargo-llvm-cov@0.6.13 (cold cache, ~3 min)"
            cargo install --locked cargo-nextest@0.9.114
            cargo install --locked cargo-llvm-cov@0.6.13
            rustup component add llvm-tools-preview

            echo "=== cargo llvm-cov nextest --json (threshold=$THRESHOLD%) ==="
            cargo llvm-cov nextest --no-fail-fast --json --output-path llvm-cov.json

            # llvm-cov JSON shape:
            #   .data[0].totals.lines.percent  (0–100 float)
            TOTAL=$(jq -r '.data[0].totals.lines.percent' llvm-cov.json)
            echo "total=${TOTAL}%  threshold=${THRESHOLD}%"

            STATUS="pass"
            if awk -v t="$TOTAL" -v th="$THRESHOLD" 'BEGIN { exit !(t < th) }'; then
              STATUS="fail"
            fi

            # Sticky PR comment with per-cluster marker so GCP and Azure
            # coexist (mirrors go-test, security-scan, ai-review).
            if [ -n "${GIT_TOKEN:-}" ] && [ -n "${PULL_NUMBER:-}" ]; then
              CLUSTER_TAG="${CLUSTER_ID:-unknown}"
              MARKER="<!-- leartech-coverage-${CLUSTER_TAG} -->"

              ICON="white_check_mark"
              VERDICT="PASS"
              if [ "$STATUS" = "fail" ]; then
                ICON="x"
                VERDICT="FAIL"
              fi

              # Top 5 lowest-covered files (excluding 100%-covered) — useful
              # signal even on well-tested repos. cargo llvm-cov JSON gives us
              # per-file coverage under .data[0].files[].
              LOWEST=$(jq -r '
                .data[0].files
                | map({name: .filename, pct: .summary.lines.percent})
                | map(select(.pct < 100))
                | sort_by(.pct)
                | .[:5]
                | .[]
                | "| `\(.name)` | \(.pct | tostring + "%")|"
              ' llvm-cov.json)
              [ -z "$LOWEST" ] && LOWEST="| — | all files ≥ 100% |"

              # printf rather than HEREDOC — see go-test comment for why
              # un-indented heredoc bodies silently truncate the catalog parse.
              BODY=$(printf '%s\n' \
                "$MARKER" \
                "### :${ICON}: Coverage: ${TOTAL}% (threshold ${THRESHOLD}%) \`[${CLUSTER_TAG}]\` — ${VERDICT}" \
                "" \
                "**Lowest-covered files**" \
                "" \
                "| File | Coverage |" \
                "|---|---|" \
                "${LOWEST}" \
                "" \
                "_Posted by \`tasks/rust-test/pullrequest.yaml\`._")

              API="https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${PULL_NUMBER}/comments?per_page=100"
              AUTH="Authorization: token ${GIT_TOKEN}"
              ACCEPT="Accept: application/vnd.github+json"

              EXISTING_ID=$(curl -fsSL -H "$AUTH" -H "$ACCEPT" "$API" \
                | jq -r --arg marker "$MARKER" '.[] | select(.body | startswith($marker)) | .id' \
                | head -1)

              PAYLOAD=$(jq -cn --arg body "$BODY" '{body: $body}')

              if [ -n "$EXISTING_ID" ]; then
                echo "==> updating existing coverage [$CLUSTER_TAG] comment $EXISTING_ID"
                curl -fsSL -X PATCH -H "$AUTH" -H "$ACCEPT" -d "$PAYLOAD" \
                  "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/comments/${EXISTING_ID}" >/dev/null
              else
                echo "==> posting new coverage [$CLUSTER_TAG] comment"
                curl -fsSL -X POST -H "$AUTH" -H "$ACCEPT" -d "$PAYLOAD" "$API" >/dev/null
              fi
            else
              echo "==> GIT_TOKEN or PULL_NUMBER unset; skipping PR coverage comment"
            fi

            if [ "$STATUS" = "fail" ]; then
              echo "FAIL: coverage ${TOTAL}% is below threshold ${THRESHOLD}%"
              exit 1
            fi
            echo "PASS: coverage ${TOTAL}% meets threshold ${THRESHOLD}%"
  podTemplate:
    tolerations:
    - key: sku
      operator: Equal
      value: build
      effect: NoSchedule
  serviceAccountName: tekton-bot
  timeout: 1h0m0s
status: {}
