# OpenAPI client SDK generation for release builds.
#
# Same shape as tasks/openapi-generation/pullrequest.yaml but driven
# from the service repo's release.yaml — runs after the service has
# been built + tagged, generates packages with the release version,
# publishes them as latest tags (no `--tag preview` flag).
#
# Consumer release.yaml typically widens OutputLanguages vs PR builds:
#   PR:      angular typescript                    (fast, frontend-only)
#   Release: angular typescript go python rust     (full set)
#
# See pullrequest.yaml header for the full env contract + secret
# prerequisite.
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: openapi-generation
spec:
  pipelineSpec:
    tasks:
    - name: openapi-generation
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          - name: GIT_TOKEN
            valueFrom:
              secretKeyRef:
                name: openapi-pkg-gen
                key: auth-token
          - name: GIT_USER
            valueFrom:
              secretKeyRef:
                name: openapi-pkg-gen
                key: user
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone.yaml@versionStream
          name: ""
          resources: {}
        - image: ghcr.io/jenkins-x/jx-boot:3.16.59
          name: jx-variables
          resources: {}
          script: |
            #!/usr/bin/env sh
            jx gitops variables
        - image: ghcr.io/mikelear/leartech-openapi-generation:latest
          name: package-generation
          resources: {}
          script: |
            #!/bin/bash
            set -e
            source /workspace/source/.jx/variables.sh

            # Single-publisher gate: this task runs on every cluster's
            # release pipeline, but only one of them should actually
            # publish (otherwise both race to push the same package
            # version → 409 / duplicate mono-repo PRs). AZ wins.
            if [ "${CLUSTER_ID:-az}" != "az" ]; then
              echo "==> CLUSTER_ID=${CLUSTER_ID} is not the codegen publisher (az); skipping"
              exit 0
            fi

            git config --global --add safe.directory /workspace/source
            git config --global user.name "${GIT_USER}"
            git config --global user.email "${GIT_USER}@users.noreply.github.com"

            # VERSION isn't in .jx/variables.sh because next-version (which
            # writes it) ran in the from-build-pack pod's workspace, not
            # this pod's. Derive it from the cluster-suffixed tag that
            # from-build-pack just pushed to origin.
            git fetch --tags --force origin
            RAW=$(git describe --tags --abbrev=0 --match "v*-${CLUSTER_ID}")
            VERSION=${RAW#v}                # v0.1.16-az -> 0.1.16-az
            VERSION=${VERSION%-${CLUSTER_ID}}  # 0.1.16-az -> 0.1.16
            export VERSION
            echo "==> derived VERSION=${VERSION} from tag ${RAW}"

            leartech-openapi-generation generate pkg ${OutputLanguages}
  podTemplate:
    tolerations:
    - key: sku
      operator: Equal
      value: build
      effect: NoSchedule
  serviceAccountName: tekton-bot
  timeout: 1h0m0s
status: {}
