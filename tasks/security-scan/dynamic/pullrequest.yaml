apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: dynamic-security-scan
spec:
  pipelineSpec:
    tasks:
    - name: dynamic-scan
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          name: ""
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - image: ghcr.io/jenkins-x/jx-boot:3.16.56
          name: orchestrate-scan
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
          env:
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: password
                  optional: true
            - name: CLUSTER_ID
              valueFrom:
                configMapKeyRef:
                  name: ai-review-cluster-config
                  key: CLUSTER_ID
                  optional: true
          script: |
            #!/bin/bash
            set -e

            APP_NAME="${REPO_NAME}"
            PREVIEW_NS="jx-${REPO_OWNER}-${APP_NAME}-pr-${PULL_NUMBER}"
            CLUSTER_ID="${CLUSTER_ID:-unknown}"
            SCAN_POD="security-scan-${PULL_NUMBER}"
            SCAN_IMAGE="ghcr.io/mikelear/security-tools:latest"

            case "$CLUSTER_ID" in
              az)  DOMAIN="az.leartech.com" ;;
              gcp) DOMAIN="jx.leartech.com" ;;
              *)   DOMAIN="jx.leartech.com" ;;
            esac

            PREVIEW_URL="https://preview-${APP_NAME}-${PREVIEW_NS}.${DOMAIN}"
            SVC_NAME="preview-${APP_NAME}"

            echo "=========================================="
            echo "Dynamic Security Scan [${CLUSTER_ID}]"
            echo "=========================================="
            echo "Preview URL: ${PREVIEW_URL}"
            echo "Preview Namespace: ${PREVIEW_NS}"
            echo "Service: ${SVC_NAME}"
            echo "=========================================="

            # --- Wait for preview namespace ---
            echo ""
            echo "=== Waiting for preview namespace ${PREVIEW_NS} ==="
            WAIT=0
            while ! kubectl get namespace ${PREVIEW_NS} >/dev/null 2>&1; do
              if [ $WAIT -ge 600 ]; then
                echo "ERROR: Preview namespace not created after 600s — aborting"
                exit 0
              fi
              echo "Waiting for namespace... (${WAIT}s)"
              sleep 15
              WAIT=$((WAIT + 15))
            done
            echo "Namespace exists"

            # Wait for pods to be running
            echo "Waiting for preview pods..."
            WAIT=0
            while [ "$(kubectl get pods -n ${PREVIEW_NS} --no-headers 2>/dev/null | grep -c Running)" -eq 0 ]; do
              if [ $WAIT -ge 300 ]; then
                echo "WARNING: No running pods after 300s, proceeding anyway"
                break
              fi
              sleep 10
              WAIT=$((WAIT + 10))
            done
            echo "Preview pods ready"

            # --- Apply egress deny to preview app pods ---
            echo ""
            echo "=== Applying egress deny to preview app pods ==="
            cat <<POLICY | kubectl apply -f - 2>/dev/null || echo "WARNING: could not apply egress deny"
            apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: preview-egress-deny
              namespace: ${PREVIEW_NS}
              labels:
                app.kubernetes.io/managed-by: security-scan-pipeline
            spec:
              podSelector:
                matchLabels:
                  app: preview-${APP_NAME}
              policyTypes:
                - Egress
              egress:
                - to:
                    - namespaceSelector:
                        matchLabels:
                          kubernetes.io/metadata.name: kube-system
                      podSelector:
                        matchLabels:
                          k8s-app: kube-dns
                  ports:
                    - protocol: UDP
                      port: 53
            POLICY

            # --- Deploy scan pod INTO the preview namespace ---
            echo ""
            echo "=== Deploying scan pod into ${PREVIEW_NS} ==="
            kubectl delete pod ${SCAN_POD} -n ${PREVIEW_NS} --ignore-not-found=true 2>/dev/null

            cat <<SCANPOD | kubectl apply -f -
            apiVersion: v1
            kind: Pod
            metadata:
              name: ${SCAN_POD}
              namespace: ${PREVIEW_NS}
              labels:
                security-scan: "true"
            spec:
              restartPolicy: Never
              activeDeadlineSeconds: 600
              containers:
              - name: scanner
                image: ${SCAN_IMAGE}
                command:
                - /app/dynamic-scan.sh
                args:
                - --preview-url
                - "${PREVIEW_URL}"
                - --svc-name
                - "${SVC_NAME}"
                - --cluster-id
                - "${CLUSTER_ID}"
                - --results-dir
                - /tmp/results
                - --repo
                - "${REPO_OWNER}/${REPO_NAME}"
                - --pr
                - "${PULL_NUMBER}"
                - --token
                - "${GIT_TOKEN}"
            SCANPOD

            # --- Wait for scan pod to complete ---
            echo ""
            echo "=== Waiting for scan pod to complete ==="
            kubectl wait --for=condition=Ready pod/${SCAN_POD} -n ${PREVIEW_NS} --timeout=60s 2>/dev/null || true
            kubectl wait --for=jsonpath='{.status.phase}'=Succeeded pod/${SCAN_POD} -n ${PREVIEW_NS} --timeout=600s 2>/dev/null || {
              echo "WARNING: Scan pod did not succeed"
              kubectl get pod ${SCAN_POD} -n ${PREVIEW_NS} 2>/dev/null
              kubectl logs ${SCAN_POD} -n ${PREVIEW_NS} --tail=20 2>/dev/null
            }

            # Show scan output
            echo ""
            echo "=== Scan Results ==="
            kubectl logs ${SCAN_POD} -n ${PREVIEW_NS} 2>/dev/null | tail -40

            # --- Cleanup ---
            echo ""
            echo "=== Cleanup ==="
            kubectl delete pod ${SCAN_POD} -n ${PREVIEW_NS} --ignore-not-found=true 2>/dev/null || true
            kubectl delete networkpolicy preview-egress-deny -n ${PREVIEW_NS} --ignore-not-found=true 2>/dev/null || true
            echo "Cleanup complete"

            echo ""
            echo "=== Dynamic Security Scan Orchestration Complete ==="
  podTemplate: {}
  serviceAccountName: tekton-bot
  timeout: 30m0s
status: {}
