apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: dynamic-security-scan
spec:
  pipelineSpec:
    tasks:
    - name: dynamic-scan
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          name: ""
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - image: ghcr.io/jenkins-x/jx-boot:3.16.56
          name: orchestrate-scan
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
          env:
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: password
                  optional: true
            - name: CLUSTER_ID
              valueFrom:
                configMapKeyRef:
                  name: ai-review-cluster-config
                  key: CLUSTER_ID
                  optional: true
          script: |
            #!/bin/bash
            set -e

            APP_NAME="${REPO_NAME}"
            PREVIEW_NS="jx-${REPO_OWNER}-${APP_NAME}-pr-${PULL_NUMBER}"
            CLUSTER_ID="${CLUSTER_ID:-unknown}"
            SCAN_IMAGE="ghcr.io/mikelear/security-tools:latest"

            case "$CLUSTER_ID" in
              az)  DOMAIN="az.leartech.com" ;;
              gcp) DOMAIN="jx.leartech.com" ;;
              *)   DOMAIN="jx.leartech.com" ;;
            esac

            PREVIEW_URL="https://preview-${APP_NAME}-${PREVIEW_NS}.${DOMAIN}"
            SVC_NAME="preview-${APP_NAME}"

            echo "=========================================="
            echo "Dynamic Security Scan [${CLUSTER_ID}]"
            echo "=========================================="
            echo "Preview URL: ${PREVIEW_URL}"
            echo "Preview Namespace: ${PREVIEW_NS}"
            echo "Service: ${SVC_NAME}"
            echo "=========================================="

            # --- Wait for preview namespace ---
            echo ""
            echo "=== Waiting for preview namespace ${PREVIEW_NS} ==="
            WAIT=0
            while ! kubectl get namespace ${PREVIEW_NS} >/dev/null 2>&1; do
              if [ $WAIT -ge 900 ]; then
                echo "WARNING: Preview namespace not created after 900s"
                echo "Posting skipped notice to PR..."
                # Post a "skipped" comment so it's visible on the PR
                TAG=""
                [ -n "$CLUSTER_ID" ] && TAG=" \`[$CLUSTER_ID]\`"
                SKIP_COMMENT="## :hourglass: Dynamic Security Scan: **Skipped**${TAG}

            Preview namespace \`${PREVIEW_NS}\` was not ready within 900s.
            The PR build may still be running. Re-run with \`/test dynamic-security-scan\` after the preview is deployed."

                if [ -n "$GIT_TOKEN" ] && [ -n "$PULL_NUMBER" ]; then
                  # Escape for JSON without jq — replace newlines with \n, escape quotes
                  BODY=$(printf '%s' "$SKIP_COMMENT" | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
                  curl -s -o /dev/null -X POST \
                    -H "Authorization: token $GIT_TOKEN" \
                    -H "Accept: application/vnd.github.v3+json" \
                    "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${PULL_NUMBER}/comments" \
                    -d "{\"body\": \"${BODY}\"}" || true
                fi
                exit 0
              fi
              echo "Waiting for namespace... (${WAIT}s)"
              sleep 15
              WAIT=$((WAIT + 15))
            done
            echo "Namespace exists"

            echo "Waiting for preview pods..."
            WAIT=0
            while [ "$(kubectl get pods -n ${PREVIEW_NS} --no-headers 2>/dev/null | grep -c Running)" -eq 0 ]; do
              if [ $WAIT -ge 300 ]; then
                echo "WARNING: No running pods after 300s, proceeding anyway"
                break
              fi
              sleep 10
              WAIT=$((WAIT + 10))
            done
            echo "Preview pods ready"

            # ===================================================
            # PHASE 1: External scan (from jx namespace, through ingress)
            # Runs Nikto + Nuclei against the external URL
            # This is what an attacker sees
            # ===================================================
            echo ""
            echo "=== Phase 1: External Scan (attacker view) ==="
            kubectl run external-scan-${PULL_NUMBER} \
              --restart=Never \
              --image=${SCAN_IMAGE} \
              -n jx \
              --override-type=strategic \
              --overrides='{"spec":{"activeDeadlineSeconds":600}}' \
              -- /app/external-scan.sh \
                --preview-url "${PREVIEW_URL}" \
                --cluster-id "${CLUSTER_ID}" \
                --results-dir /tmp/results \
                --repo "${REPO_OWNER}/${REPO_NAME}" \
                --pr "${PULL_NUMBER}" \
                --token "${GIT_TOKEN}" \
              2>/dev/null || true

            kubectl wait --for=condition=Ready pod/external-scan-${PULL_NUMBER} -n jx --timeout=60s 2>/dev/null || true
            kubectl wait --for=jsonpath='{.status.phase}'=Succeeded pod/external-scan-${PULL_NUMBER} -n jx --timeout=600s 2>/dev/null || {
              echo "WARNING: External scan pod did not succeed in time"
              kubectl logs external-scan-${PULL_NUMBER} -n jx --tail=10 2>/dev/null || true
            }

            echo ""
            echo "=== External Scan Output ==="
            kubectl logs external-scan-${PULL_NUMBER} -n jx --tail=40 2>/dev/null || true
            kubectl delete pod external-scan-${PULL_NUMBER} -n jx --ignore-not-found=true 2>/dev/null || true

            # ===================================================
            # PHASE 2: Internal scan (inside preview namespace)
            # Runs Nmap + Egress test
            # This tests internal exposure and network isolation
            # ===================================================
            echo ""
            echo "=== Phase 2: Internal Scan (inside namespace) ==="

            # Apply egress deny to preview app pods
            cat <<POLICY | kubectl apply -f - 2>/dev/null || echo "WARNING: could not apply egress deny"
            apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: preview-egress-deny
              namespace: ${PREVIEW_NS}
              labels:
                app.kubernetes.io/managed-by: security-scan-pipeline
            spec:
              podSelector:
                matchLabels:
                  app: preview-${APP_NAME}
              policyTypes:
                - Egress
              egress:
                - to:
                    - namespaceSelector:
                        matchLabels:
                          kubernetes.io/metadata.name: kube-system
                      podSelector:
                        matchLabels:
                          k8s-app: kube-dns
                  ports:
                    - protocol: UDP
                      port: 53
            POLICY

            # Deploy internal scan pod into preview namespace
            kubectl delete pod internal-scan-${PULL_NUMBER} -n ${PREVIEW_NS} --ignore-not-found=true 2>/dev/null

            cat <<SCANPOD | kubectl apply -f -
            apiVersion: v1
            kind: Pod
            metadata:
              name: internal-scan-${PULL_NUMBER}
              namespace: ${PREVIEW_NS}
              labels:
                security-scan: "true"
            spec:
              restartPolicy: Never
              activeDeadlineSeconds: 600
              containers:
              - name: scanner
                image: ${SCAN_IMAGE}
                command:
                - /app/internal-scan.sh
                args:
                - --svc-name
                - "${SVC_NAME}"
                - --cluster-id
                - "${CLUSTER_ID}"
                - --results-dir
                - /tmp/results
                - --repo
                - "${REPO_OWNER}/${REPO_NAME}"
                - --pr
                - "${PULL_NUMBER}"
                - --token
                - "${GIT_TOKEN}"
            SCANPOD

            kubectl wait --for=condition=Ready pod/internal-scan-${PULL_NUMBER} -n ${PREVIEW_NS} --timeout=60s 2>/dev/null || true
            kubectl wait --for=jsonpath='{.status.phase}'=Succeeded pod/internal-scan-${PULL_NUMBER} -n ${PREVIEW_NS} --timeout=600s 2>/dev/null || {
              echo "WARNING: Internal scan pod did not succeed in time"
              kubectl logs internal-scan-${PULL_NUMBER} -n ${PREVIEW_NS} --tail=10 2>/dev/null || true
            }

            echo ""
            echo "=== Internal Scan Output ==="
            kubectl logs internal-scan-${PULL_NUMBER} -n ${PREVIEW_NS} --tail=40 2>/dev/null || true

            # --- Cleanup ---
            echo ""
            echo "=== Cleanup ==="
            kubectl delete pod internal-scan-${PULL_NUMBER} -n ${PREVIEW_NS} --ignore-not-found=true 2>/dev/null || true
            kubectl delete networkpolicy preview-egress-deny -n ${PREVIEW_NS} --ignore-not-found=true 2>/dev/null || true
            echo "Cleanup complete"

            echo ""
            echo "=== Dynamic Security Scan Complete ==="
  podTemplate: {}
  serviceAccountName: tekton-bot
  timeout: 30m0s
status: {}
