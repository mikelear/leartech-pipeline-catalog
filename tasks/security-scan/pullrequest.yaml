apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: security-scan
spec:
  pipelineSpec:
    tasks:
    - name: security-scan
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          name: ""
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - image: ghcr.io/mikelear/security-tools:latest
          name: static-security-scan
          resources: {}
          env:
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: password
                  optional: true
            - name: CLUSTER_ID
              valueFrom:
                configMapKeyRef:
                  name: ai-review-cluster-config
                  key: CLUSTER_ID
                  optional: true
          script: |
            #!/bin/bash
            /app/static-scan.sh \
              --source-dir /workspace/source \
              --cluster-id "${CLUSTER_ID:-unknown}" \
              --repo "${REPO_OWNER}/${REPO_NAME}" \
              --pr "${PULL_NUMBER}" \
              --token "${GIT_TOKEN}"
  podTemplate: {}
  serviceAccountName: tekton-bot
  timeout: 30m0s
status: {}
