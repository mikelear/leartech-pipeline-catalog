apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: go-test
spec:
  pipelineSpec:
    tasks:
    - name: go-test
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          - name: CLUSTER_ID
            valueFrom:
              configMapKeyRef:
                name: jx-cluster-config
                key: CLUSTER_ID
                optional: true
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        # Non-alpine golang image: -race needs cgo + gcc which alpine lacks
        # by default. Slightly bigger image, but no apk add build-base.
        - image: golang:1.25
          name: go-test
          resources:
            requests:
              cpu: 400m
              memory: 512Mi
          env:
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: password
                  optional: true
          script: |
            #!/bin/bash
            set -eo pipefail

            # Consumer-overridable via env:
            #   COVERAGE_THRESHOLD — minimum acceptable total coverage % (default 60)
            #   COVERAGE_SCOPE     — go test packages for -coverpkg (default ./internal/...)
            THRESHOLD="${COVERAGE_THRESHOLD:-60.0}"
            SCOPE="${COVERAGE_SCOPE:-./internal/...}"

            echo "=== go test -race -coverprofile (scope=$SCOPE, threshold=$THRESHOLD%) ==="
            go test ./... -v -count=1 -race -coverpkg="$SCOPE" -coverprofile=cover.out

            echo
            echo "=== per-function coverage ==="
            go tool cover -func=cover.out

            TOTAL=$(go tool cover -func=cover.out | awk '/^total:/ {print $3}' | sed 's/%//')

            echo
            echo "=== coverage summary ==="
            echo "total=${TOTAL}%  threshold=${THRESHOLD}%"

            STATUS="pass"
            if awk -v t="$TOTAL" -v th="$THRESHOLD" 'BEGIN { exit !(t < th) }'; then
              STATUS="fail"
            fi

            # Build PR sticky comment. Per-cluster marker
            # <!-- leartech-coverage-<cluster> --> so GCP and Azure
            # coexist instead of clobbering each other (mirrors the
            # security-scan + ai-review conventions).
            if [ -n "${GIT_TOKEN:-}" ] && [ -n "${PULL_NUMBER:-}" ]; then
              apt-get update -qq && apt-get install -y -qq --no-install-recommends jq curl >/dev/null

              CLUSTER_TAG="${CLUSTER_ID:-unknown}"
              MARKER="<!-- leartech-coverage-${CLUSTER_TAG} -->"

              ICON="white_check_mark"
              VERDICT="PASS"
              if [ "$STATUS" = "fail" ]; then
                ICON="x"
                VERDICT="FAIL"
              fi

              # Top 5 lowest-covered functions (excluding 100%-covered ones so
              # the table is useful even on well-tested repos). Skips the
              # `total:` summary row.
              LOWEST=$(go tool cover -func=cover.out \
                | awk 'NR>1 && $1!="total:" && $NF!="100.0%" {printf "| `%s` | `%s` | %s |\n", $1, $2, $NF}' \
                | sort -t '|' -k4 -g \
                | head -5)
              [ -z "$LOWEST" ] && LOWEST="| — | — | all functions ≥ 100% |"

              # Build body via printf rather than HEREDOC — YAML `script: |`
              # treats any line with less indentation than the first content
              # line as the end of the block, so an un-indented heredoc body
              # silently truncates the script at the catalog-parse layer
              # (Lighthouse then skips creating the LighthouseJob — seen
              # 2026-04-17 on PR #4 where the `test` trigger never fired).
              BODY=$(printf '%s\n' \
                "$MARKER" \
                "### :${ICON}: Coverage: ${TOTAL}% (threshold ${THRESHOLD}%) \`[${CLUSTER_TAG}]\` — ${VERDICT}" \
                "" \
                "Scope: \`${SCOPE}\`" \
                "" \
                "**Lowest-covered functions**" \
                "" \
                "| File | Function | Coverage |" \
                "|---|---|---|" \
                "${LOWEST}" \
                "" \
                "_Posted by \`tasks/go-test/pullrequest.yaml\`._")

              # ?per_page=100 so the marker search sees older comments on
              # long-lived PRs. Without it, GitHub defaults to 30 and the
              # sticky-patch lookup misses — duplicate comments posted.
              API="https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${PULL_NUMBER}/comments?per_page=100"
              AUTH="Authorization: token ${GIT_TOKEN}"
              ACCEPT="Accept: application/vnd.github+json"

              # Find existing sticky comment (by per-cluster marker)
              EXISTING_ID=$(curl -fsSL -H "$AUTH" -H "$ACCEPT" "$API" \
                | jq -r --arg marker "$MARKER" '.[] | select(.body | startswith($marker)) | .id' \
                | head -1)

              PAYLOAD=$(jq -cn --arg body "$BODY" '{body: $body}')

              if [ -n "$EXISTING_ID" ]; then
                echo "==> updating existing coverage [$CLUSTER_TAG] comment $EXISTING_ID"
                curl -fsSL -X PATCH -H "$AUTH" -H "$ACCEPT" -d "$PAYLOAD" \
                  "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/comments/${EXISTING_ID}" >/dev/null
              else
                echo "==> posting new coverage [$CLUSTER_TAG] comment"
                curl -fsSL -X POST  -H "$AUTH" -H "$ACCEPT" -d "$PAYLOAD" "$API" >/dev/null
              fi
            else
              echo "==> GIT_TOKEN or PULL_NUMBER unset; skipping PR coverage comment"
            fi

            if [ "$STATUS" = "fail" ]; then
              echo "FAIL: coverage ${TOTAL}% is below threshold ${THRESHOLD}%"
              exit 1
            fi
            echo "PASS: coverage ${TOTAL}% meets threshold ${THRESHOLD}%"
  podTemplate: {}
  serviceAccountName: tekton-bot
  timeout: 1h0m0s
status: {}
