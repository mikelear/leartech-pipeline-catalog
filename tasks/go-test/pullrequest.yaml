apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: go-test
spec:
  pipelineSpec:
    tasks:
    - name: go-test
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          - name: CLUSTER_ID
            valueFrom:
              configMapKeyRef:
                name: jx-cluster-config
                key: CLUSTER_ID
                optional: true
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        # Non-alpine golang image: -race needs cgo + gcc which alpine lacks
        # by default. Slightly bigger image, but no apk add build-base.
        - image: golang:1.26
          name: go-test
          resources:
            requests:
              cpu: 400m
              memory: 512Mi
          env:
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: password
                  optional: true
          script: |
            #!/bin/bash
            set -eo pipefail

            # Consumer-overridable via env:
            #   COVERAGE_THRESHOLD     — minimum acceptable total coverage % (default 60)
            #   COVERAGE_SCOPE         — go test packages for -coverpkg (default ./internal/...)
            #   COVERAGE_DELTA_TOLERANCE — allow PR coverage to be at most this much
            #                             below base-branch coverage (default 0.5%, absorbs
            #                             measurement noise). Setting to a large value
            #                             effectively disables the delta check.
            THRESHOLD="${COVERAGE_THRESHOLD:-60.0}"
            SCOPE="${COVERAGE_SCOPE:-./internal/...}"
            DELTA_TOL="${COVERAGE_DELTA_TOLERANCE:-0.5}"

            echo "=== go test -race -coverprofile (scope=$SCOPE, threshold=$THRESHOLD%) ==="
            go test ./... -v -count=1 -race -coverpkg="$SCOPE" -coverprofile=cover.out

            echo
            echo "=== per-function coverage ==="
            go tool cover -func=cover.out

            TOTAL=$(go tool cover -func=cover.out | awk '/^total:/ {print $3}' | sed 's/%//')

            echo
            echo "=== coverage summary ==="
            echo "total=${TOTAL}%  threshold=${THRESHOLD}%"

            STATUS="pass"
            STATUS_REASON=""
            if awk -v t="$TOTAL" -v th="$THRESHOLD" 'BEGIN { exit !(t < th) }'; then
              STATUS="fail"
              STATUS_REASON="below floor ${THRESHOLD}%"
            fi

            # ── delta-coverage check: PR coverage must not drop vs base branch ──
            # Without this, the floor check is satisfied as long as overall
            # coverage stays above THRESHOLD — so a PR can add 100 lines of
            # untested code (dragging coverage down) and still pass while the
            # tested code keeps the average up. The delta check enforces
            # "new code ships with tests" at the gate.
            #
            # PULL_BASE_REF is the base branch the PR targets (Tekton injects
            # via Lighthouse env vars). Default 'main' for safety.
            BASE_REF="${PULL_BASE_REF:-main}"
            BASE_TOTAL=""
            BASE_DELTA=""
            BASE_STATUS=""

            echo
            echo "=== delta-coverage check vs origin/${BASE_REF} ==="
            # Use a SEPARATE clone of base for the baseline test run.
            # The earlier approach (git checkout origin/BASE_REF -- . in
            # the same workspace) doesn't remove UNTRACKED files added by
            # the PR — so newly-added _test.go files stayed in the working
            # tree during the "base" go test, inflating base coverage to
            # match PR coverage and producing a misleading 0.00% delta.
            # Verified 2026-05-15 on canary PR#25: PR added tests that
            # raised coverage from 44.9% → 57.7%, but the gate reported
            # base=57.7% pr=57.7% delta=0.00% because base test inherited
            # the PR's untracked test file.
            BASE_CLONE_DIR=$(mktemp -d -t go-test-base-XXXXXX)
            REPO_URL="https://github.com/${REPO_OWNER}/${REPO_NAME}.git"
            if git clone --depth=1 --branch="${BASE_REF}" --quiet "$REPO_URL" "$BASE_CLONE_DIR" 2>/dev/null; then
              # Run tests in the fresh clone — pristine base content with
              # no PR-added untracked files. Suppress output (failures are
              # treated as "no baseline" rather than blocking the gate).
              if (cd "$BASE_CLONE_DIR" && go test ./... -count=1 -coverpkg="$SCOPE" -coverprofile=cover-base.out) >/tmp/base-test.log 2>&1; then
                BASE_TOTAL=$(go tool cover -func="${BASE_CLONE_DIR}/cover-base.out" 2>/dev/null | awk '/^total:/ {print $3}' | sed 's/%//')
              fi
              rm -rf "$BASE_CLONE_DIR"
            fi

            if [ -n "$BASE_TOTAL" ]; then
              BASE_DELTA=$(awk -v pr="$TOTAL" -v base="$BASE_TOTAL" 'BEGIN {printf "%.2f", pr - base}')
              echo "base=${BASE_TOTAL}%  pr=${TOTAL}%  delta=${BASE_DELTA}%  tolerance=-${DELTA_TOL}%"
              # Fail iff delta < -tolerance (i.e. coverage dropped beyond noise).
              if awk -v d="$BASE_DELTA" -v tol="$DELTA_TOL" 'BEGIN { exit !(d < -tol) }'; then
                STATUS="fail"
                STATUS_REASON="${STATUS_REASON:+$STATUS_REASON; }coverage dropped ${BASE_DELTA}% vs origin/${BASE_REF} (tolerance -${DELTA_TOL}%)"
                BASE_STATUS="REGRESSED"
              else
                BASE_STATUS="OK"
              fi
            else
              echo "base-branch coverage unavailable (new repo, base test failure, or fetch denied); skipping delta check"
              BASE_STATUS="UNAVAILABLE"
            fi

            # Build PR sticky comment. Per-cluster marker
            # <!-- leartech-coverage-<cluster> --> so GCP and Azure
            # coexist instead of clobbering each other (mirrors the
            # security-scan + ai-review conventions).
            if [ -n "${GIT_TOKEN:-}" ] && [ -n "${PULL_NUMBER:-}" ]; then
              apt-get update -qq && apt-get install -y -qq --no-install-recommends jq curl >/dev/null

              CLUSTER_TAG="${CLUSTER_ID:-unknown}"
              MARKER="<!-- leartech-coverage-${CLUSTER_TAG} -->"

              ICON="white_check_mark"
              VERDICT="PASS"
              if [ "$STATUS" = "fail" ]; then
                ICON="x"
                VERDICT="FAIL"
              fi

              # Top 5 lowest-covered functions (excluding 100%-covered ones so
              # the table is useful even on well-tested repos). Skips the
              # `total:` summary row.
              LOWEST=$(go tool cover -func=cover.out \
                | awk 'NR>1 && $1!="total:" && $NF!="100.0%" {printf "| `%s` | `%s` | %s |\n", $1, $2, $NF}' \
                | sort -t '|' -k4 -g \
                | head -5)
              [ -z "$LOWEST" ] && LOWEST="| — | — | all functions ≥ 100% |"

              # Build body via printf rather than HEREDOC — YAML `script: |`
              # treats any line with less indentation than the first content
              # line as the end of the block, so an un-indented heredoc body
              # silently truncates the script at the catalog-parse layer
              # (Lighthouse then skips creating the LighthouseJob — seen
              # 2026-04-17 on PR #4 where the `test` trigger never fired).
              # Build a per-cluster delta line so the engineer can see
              # base/PR/delta at a glance. "UNAVAILABLE" when base branch
              # tests couldn't be run (new repo, etc.).
              if [ "$BASE_STATUS" = "UNAVAILABLE" ]; then
                DELTA_LINE="_Delta vs \`${BASE_REF}\`: unavailable (couldn't fetch/run baseline)_"
              elif [ "$BASE_STATUS" = "REGRESSED" ]; then
                DELTA_LINE=":warning: **Delta vs \`${BASE_REF}\`**: ${BASE_TOTAL}% → ${TOTAL}% (\`${BASE_DELTA}%\` — exceeds tolerance \`-${DELTA_TOL}%\`)"
              else
                DELTA_LINE=":information_source: Delta vs \`${BASE_REF}\`: ${BASE_TOTAL}% → ${TOTAL}% (\`${BASE_DELTA}%\`)"
              fi

              BODY=$(printf '%s\n' \
                "$MARKER" \
                "### :${ICON}: Coverage: ${TOTAL}% (threshold ${THRESHOLD}%) \`[${CLUSTER_TAG}]\` — ${VERDICT}" \
                "" \
                "${DELTA_LINE}" \
                "" \
                "Scope: \`${SCOPE}\`" \
                "" \
                "**Lowest-covered functions**" \
                "" \
                "| File | Function | Coverage |" \
                "|---|---|---|" \
                "${LOWEST}" \
                "" \
                "_Posted by \`tasks/go-test/pullrequest.yaml\`._")

              # ?per_page=100 so the marker search sees older comments on
              # long-lived PRs. Without it, GitHub defaults to 30 and the
              # sticky-patch lookup misses — duplicate comments posted.
              API="https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${PULL_NUMBER}/comments?per_page=100"
              AUTH="Authorization: token ${GIT_TOKEN}"
              ACCEPT="Accept: application/vnd.github+json"

              # Find existing sticky comment (by per-cluster marker)
              EXISTING_ID=$(curl -fsSL -H "$AUTH" -H "$ACCEPT" "$API" \
                | jq -r --arg marker "$MARKER" '.[] | select(.body | startswith($marker)) | .id' \
                | head -1)

              PAYLOAD=$(jq -cn --arg body "$BODY" '{body: $body}')

              if [ -n "$EXISTING_ID" ]; then
                echo "==> updating existing coverage [$CLUSTER_TAG] comment $EXISTING_ID"
                curl -fsSL -X PATCH -H "$AUTH" -H "$ACCEPT" -d "$PAYLOAD" \
                  "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/comments/${EXISTING_ID}" >/dev/null
              else
                echo "==> posting new coverage [$CLUSTER_TAG] comment"
                curl -fsSL -X POST  -H "$AUTH" -H "$ACCEPT" -d "$PAYLOAD" "$API" >/dev/null
              fi
            else
              echo "==> GIT_TOKEN or PULL_NUMBER unset; skipping PR coverage comment"
            fi

            if [ "$STATUS" = "fail" ]; then
              echo "FAIL: ${STATUS_REASON}"
              exit 1
            fi
            echo "PASS: coverage ${TOTAL}% meets threshold ${THRESHOLD}% (delta=${BASE_DELTA:-n/a}% vs ${BASE_REF})"
  podTemplate:
    tolerations:
    - key: sku
      operator: Equal
      value: build
      effect: NoSchedule
  serviceAccountName: tekton-bot
  timeout: 1h0m0s
status: {}
