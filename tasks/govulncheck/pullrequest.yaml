apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: govulncheck
spec:
  pipelineSpec:
    tasks:
    - name: govulncheck
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - image: golang:1.25-alpine
          name: govulncheck
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
          script: |
            #!/bin/sh
            set -e
            apk add --no-cache git
            go mod download
            # govulncheck version tracks the minimum Go it supports.
            # v1.2.0 (current @latest as of 2026-04) requires go >= 1.25.0.
            # Most leartech Go services are still on go 1.24.x, so pin to
            # v1.1.4 — the last release compatible with Go 1.24. Bump this
            # alongside the fleet-wide go.mod upgrade to 1.25.
            GOVULNCHECK_VERSION="${GOVULNCHECK_VERSION:-v1.1.4}"
            go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
            govulncheck ./...
  podTemplate:
    tolerations:
    - key: sku
      operator: Equal
      value: build
      effect: NoSchedule
  serviceAccountName: tekton-bot
  timeout: 30m0s
status: {}
