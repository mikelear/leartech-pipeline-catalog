apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: govulncheck
spec:
  pipelineSpec:
    tasks:
    - name: govulncheck
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          resources:
            requests:
              cpu: 400m
              memory: 512Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - image: golang:1.25-alpine
          name: govulncheck
          resources: {}
          script: |
            #!/bin/sh
            set -e
            apk add --no-cache git
            go mod download
            # govulncheck @latest often requires a newer Go than the base image.
            # If a consumer's go.mod is `go 1.25.x`, `@latest` works; if it's
            # 1.24.x, pin to @v1.1.4 (last release that supports Go 1.24).
            go install golang.org/x/vuln/cmd/govulncheck@latest
            govulncheck ./...
  podTemplate: {}
  serviceAccountName: tekton-bot
  timeout: 30m0s
status: {}
