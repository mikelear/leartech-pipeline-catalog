# end2end presubmit — exercises the live preview deploy of a PR.
#
# ── CONTRACT FOR CONSUMERS ────────────────────────────────────────────
#
# Missing: if the consumer repo has no executable end2end/run.sh, this
# task posts a friendly "not configured" sticky comment and passes.
# Adoption is opt-in per repo.
#
# Present: the task exports the env below, waits up to 10 min (or
# END2END_HEALTH_TIMEOUT seconds) for the preview to respond 200 on
# /health/live, invokes bash end2end/run.sh,
# then reads end2end/results.json and posts a sticky comment. The
# check PASSES iff results.json.success == true. Non-zero exit from
# run.sh without a valid results.json is treated as a script crash
# (check fails, sticky comment flags the crash).
#
# ── ENV AVAILABLE TO end2end/run.sh ────────────────────────────────────
#
#   PREVIEW_URL         https://<APP_NAME>-pr-<PULL_NUMBER>.jx.leartech.com
#   PREVIEW_HOST_BASE   pr-<PULL_NUMBER>.jx.leartech.com
#                       (suffix shared by all preview hostnames — useful
#                       for multi-subdomain stacks like auth-ui + auth-api
#                       + hydra; see leartech-auth-ui for an example)
#   PREVIEW_NAMESPACE   jx-<REPO_OWNER>-<APP_NAME>-pr-<PULL_NUMBER>
#   APP_NAME            service repo name
#   PULL_NUMBER         PR number on GitHub
#   REPO_OWNER          e.g. mikelear
#   REPO_NAME           same as APP_NAME for now
#   CLUSTER_ID          gcp | azure (from jx-cluster-config ConfigMap)
#   VERSION             0.0.0-PR-<N>-<ITER>-SNAPSHOT
#   GIT_TOKEN           tekton-bot GitHub token — use CAREFULLY, this
#                       writes as tekton-bot. Prefer read-only usage.
#
# Standard debian-slim packages are pre-installed (jq, curl, bash,
# python3, openssl) so scripts can call them without apk/apt-get.
#
# ── end2end/results.json SCHEMA ────────────────────────────────────────
#
#   {
#     "success": true,                      // overall pass/fail
#     "summary": "3/3 checks passed",       // 1-line human-readable
#     "tests": [
#       { "name": "health-live",            // short identifier
#         "status": "pass",                 // pass | fail | skip
#         "duration_ms": 127,
#         "message": "HTTP 200" }           // short context or tail
#     ],
#     "metadata": {
#       "preview_url": "https://...",       // echoed for convenience
#       "version":     "0.0.0-PR-4-1-SNAPSHOT"
#     }
#   }
#
# The task does not second-guess the shape beyond these fields. If you
# need richer data (screenshots, traces, perf numbers) add them under
# metadata or extend tests[].
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: end2end
spec:
  pipelineSpec:
    tasks:
    - name: end2end
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          - name: CLUSTER_ID
            valueFrom:
              configMapKeyRef:
                name: jx-cluster-config
                key: CLUSTER_ID
                optional: true
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - image: ghcr.io/jenkins-x/jx-boot:3.16.59
          name: jx-variables
          resources: {}
          script: |
            #!/usr/bin/env sh
            jx gitops variables
        - image: debian:12-slim
          name: end2end
          resources: {}
          env:
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: password
                  optional: true
          script: |
            #!/bin/bash
            set -eo pipefail

            # Tools the contract guarantees to consumer scripts.
            apt-get update -qq && apt-get install -y -qq --no-install-recommends \
              ca-certificates curl jq bash python3 python3-pip openssl >/dev/null
            # kubectl for scripts that need cluster-internal access (e.g. Hydra admin, Mongo seed)
            curl -fsSL "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl
            chmod +x /usr/local/bin/kubectl

            source .jx/variables.sh

            export PREVIEW_HOST_BASE="pr-${PULL_NUMBER}.jx.leartech.com"
            # Ingress prefix defaults to APP_NAME — matches the pattern
            # used by leartech-angular-service-template +
            # leartech-go-service-template. Consumers with shortened
            # subdomains (e.g. leartech-auth-ui ingress is
            # auth-ui-pr-N.jx.leartech.com not leartech-auth-ui-pr-N)
            # override via stepTemplate.env.PREVIEW_HOST_PREFIX in their
            # .lighthouse/jenkins-x/end2end.yaml.
            : "${PREVIEW_HOST_PREFIX:=${APP_NAME}}"
            export PREVIEW_URL="https://${PREVIEW_HOST_PREFIX}-${PREVIEW_HOST_BASE}"
            export PREVIEW_NAMESPACE="jx-${REPO_OWNER}-${APP_NAME}-pr-${PULL_NUMBER}"

            echo "==> consumer env:"
            echo "    PREVIEW_URL=$PREVIEW_URL"
            echo "    PREVIEW_HOST_BASE=$PREVIEW_HOST_BASE"
            echo "    PREVIEW_NAMESPACE=$PREVIEW_NAMESPACE"
            echo "    APP_NAME=$APP_NAME  PULL_NUMBER=$PULL_NUMBER  CLUSTER_ID=${CLUSTER_ID:-}"

            # ── consumer-script resolution ─────────────────────────────
            HAS_SCRIPT=0
            [ -x end2end/run.sh ] && HAS_SCRIPT=1

            # Per-cluster sticky marker so GCP and Azure comments coexist
            # instead of clobbering each other (mirrors the security-scan
            # + ai-review conventions).
            CLUSTER_TAG="${CLUSTER_ID:-unknown}"
            MARKER="<!-- leartech-end2end-${CLUSTER_TAG} -->"

            # ── helper: post/patch sticky comment ──────────────────────
            post_sticky() {
              local body="$1"
              if [ -z "${GIT_TOKEN:-}" ] || [ -z "${PULL_NUMBER:-}" ]; then
                echo "==> GIT_TOKEN or PULL_NUMBER unset; skipping PR comment"
                return 0
              fi
              # ?per_page=100 so the marker search sees older comments on
              # long-lived PRs. Without it GitHub defaults to 30 and the
              # sticky-patch lookup misses — duplicate comments posted.
              local api="https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${PULL_NUMBER}/comments?per_page=100"
              local auth="Authorization: token ${GIT_TOKEN}"
              local accept="Accept: application/vnd.github+json"
              local existing_id
              existing_id=$(curl -fsSL -H "$auth" -H "$accept" "$api" \
                | jq -r --arg marker "$MARKER" '.[] | select(.body | startswith($marker)) | .id' \
                | head -1)
              local payload
              payload=$(jq -cn --arg body "$body" '{body: $body}')
              if [ -n "$existing_id" ]; then
                echo "==> updating existing end2end [$CLUSTER_TAG] comment $existing_id"
                curl -fsSL -X PATCH -H "$auth" -H "$accept" -d "$payload" \
                  "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/comments/${existing_id}" >/dev/null
              else
                echo "==> posting new end2end [$CLUSTER_TAG] comment"
                curl -fsSL -X POST -H "$auth" -H "$accept" -d "$payload" "$api" >/dev/null
              fi
            }

            # ── branch 1: no end2end/run.sh → friendly pass ─────────────
            if [ "$HAS_SCRIPT" = "0" ]; then
              echo "==> no executable end2end/run.sh in repo; posting 'not configured' note"
              body=$(printf '%s\n' \
                "$MARKER" \
                ":information_source: **End-to-end: not configured** \`[$CLUSTER_TAG]\`" \
                "" \
                "This repo has no executable \`end2end/run.sh\`. Add one (make it \`chmod +x\`) to run presubmit checks against the preview deploy." \
                "" \
                "Contract: \`tasks/end2end/pullrequest.yaml\` in \`leartech-pipeline-catalog\`." \
                "" \
                "_Posted by \`tasks/end2end/pullrequest.yaml\`._")
              post_sticky "$body"
              echo "PASS: no end2end configured"
              exit 0
            fi

            # ── branch 2: wait for preview ─────────────────────────────
            # Require 3 consecutive successful probes with a small gap
            # between them so we don't catch the rolling-deploy window
            # where one pod serves /health/live right before being
            # terminated. Each probe: GET with 5s timeout.
            MAX_WAIT="${END2END_HEALTH_TIMEOUT:-600}"
            # Health probe path default: /health/live (Go services).
            # SPAs on leartech-nginx expose /health (no /live). Consumers
            # override via stepTemplate.env.END2END_HEALTH_PATH.
            HEALTH_PATH="${END2END_HEALTH_PATH:-/health/live}"
            echo "==> waiting up to $((MAX_WAIT / 60)) min for $PREVIEW_URL$HEALTH_PATH (3 consecutive 200s)"
            DEADLINE=$(( $(date +%s) + MAX_WAIT ))
            STREAK=0
            REQUIRED=3
            while [ "$STREAK" -lt "$REQUIRED" ]; do
              if curl -sSf -o /dev/null -m 5 "$PREVIEW_URL$HEALTH_PATH" 2>/dev/null; then
                STREAK=$((STREAK + 1))
                echo "   probe $STREAK/$REQUIRED ok"
              else
                STREAK=0
              fi
              if [ "$STREAK" -lt "$REQUIRED" ]; then
                if [ "$(date +%s)" -ge "$DEADLINE" ]; then
                  body=$(printf '%s\n' \
                    "$MARKER" \
                    ":x: **End-to-end: FAIL (preview not ready)** \`[$CLUSTER_TAG]\`" \
                    "" \
                    "\`$PREVIEW_URL$HEALTH_PATH\` never returned 3 consecutive 200s within $((MAX_WAIT / 60)) min. The PR's \`pr\` check (kaniko + jx-preview) may have failed or the preview pod may still be pulling images." \
                    "" \
                    "_Posted by \`tasks/end2end/pullrequest.yaml\`._")
                  post_sticky "$body"
                  echo "FAIL: preview never reached stable ready state"
                  exit 1
                fi
                sleep 5
              fi
            done
            # Small grace period before invoking the script so any
            # in-flight pod churn has time to settle.
            sleep 3
            echo "==> preview stable; invoking end2end/run.sh"

            # ── branch 3: run consumer script ──────────────────────────
            SCRIPT_EXIT=0
            bash end2end/run.sh || SCRIPT_EXIT=$?
            echo "==> end2end/run.sh exited with $SCRIPT_EXIT"

            if [ ! -f end2end/results.json ]; then
              body=$(printf '%s\n' \
                "$MARKER" \
                ":x: **End-to-end: FAIL (no results.json)** \`[$CLUSTER_TAG]\`" \
                "" \
                "\`end2end/run.sh\` exited $SCRIPT_EXIT without writing \`end2end/results.json\`. See the \`end2end\` check logs for script output." \
                "" \
                "The script must emit \`end2end/results.json\` per the schema in \`tasks/end2end/pullrequest.yaml\` so the sticky PR comment can render." \
                "" \
                "_Posted by \`tasks/end2end/pullrequest.yaml\`._")
              post_sticky "$body"
              echo "FAIL: no results.json"
              exit 1
            fi

            if ! jq -e . end2end/results.json >/dev/null 2>&1; then
              body=$(printf '%s\n' \
                "$MARKER" \
                ":x: **End-to-end: FAIL (results.json malformed)** \`[$CLUSTER_TAG]\`" \
                "" \
                "\`end2end/results.json\` is not valid JSON. See check logs." \
                "" \
                "_Posted by \`tasks/end2end/pullrequest.yaml\`._")
              post_sticky "$body"
              echo "FAIL: results.json malformed"
              exit 1
            fi

            SUCCESS=$(jq -r '.success' end2end/results.json)
            SUMMARY=$(jq -r '.summary // "(no summary)"' end2end/results.json)

            TEST_ROWS=$(jq -r '.tests[]? |
              "| `\(.name)` | " +
              (if .status=="pass" then ":white_check_mark: pass"
               elif .status=="fail" then ":x: fail"
               else ":large_blue_circle: \(.status)" end) +
              " | \(.duration_ms // 0)ms | \(.message // "") |"' end2end/results.json)
            [ -z "$TEST_ROWS" ] && TEST_ROWS="| — | — | — | (no tests emitted) |"

            if [ "$SUCCESS" = "true" ]; then
              ICON="white_check_mark"; VERDICT="PASS"
            else
              ICON="x"; VERDICT="FAIL"
            fi

            body=$(printf '%s\n' \
              "$MARKER" \
              ":${ICON}: **End-to-end: ${VERDICT}** \`[$CLUSTER_TAG]\` — ${SUMMARY}" \
              "" \
              "Preview: ${PREVIEW_URL}" \
              "" \
              "| Test | Status | Duration | Message |" \
              "|---|---|---|---|" \
              "${TEST_ROWS}" \
              "" \
              "_Posted by \`tasks/end2end/pullrequest.yaml\`._")
            post_sticky "$body"

            if [ "$SUCCESS" != "true" ]; then
              echo "FAIL: end2end results.success != true"
              exit 1
            fi
            echo "PASS: end2end complete"
  podTemplate: {}
  serviceAccountName: tekton-bot
  timeout: 30m0s
status: {}
