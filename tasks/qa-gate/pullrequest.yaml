# leartech-gate Tekton task — runs as a presubmit on GitOps repos that
# carry promotion PRs. Reads the PR's helmfile, fetches required-tests
# from leartech-qa-management, queries GCS for per-test result JSONs,
# and posts a sticky PR comment + sets the check status.
#
# Spike scope (Session 0 — 2026-05-05): single quill (shift-left-tests),
# single image tag :latest, no risk-driven override stiffening, no
# multi-cluster fan-out at task-level (each cluster posts its own check
# via the standard gcp/ az/ prefixing convention).
#
# Phase 1 hardening: pin image to a versioned tag, add data-driven multi-quill
# config in qa-management, multi-cluster aware result-store reads.
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: qa-gate
spec:
  pipelineSpec:
    tasks:
    - name: qa-gate
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          - name: CLUSTER_ID
            valueFrom:
              configMapKeyRef:
                name: jx-cluster-config
                key: CLUSTER_ID
                optional: true
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
          workingDir: /workspace/source
        steps:
        # Clone PR HEAD only — no merge with main. We need to do the
        # equivalent of `git fetch refs/pull/N/head` and read the helmfile
        # at PR HEAD, NOT a tentative merge result. The standard
        # `git-clone-pr` task does clone+merge, which fails on stale PRs
        # whose JX-regenerated `config-root/.../jx-verify/*-job.yaml` files
        # have been renamed multiple times in main (PR #260 hit this).
        # The gate doesn't care about config-root — it reads helmfile.yaml
        # which doesn't conflict — so HEAD-only is safe + correct.
        - image: alpine/git:2.40.1
          name: git-clone-pr-head
          resources: {}
          script: |
            #!/bin/sh
            set -e
            cd /workspace/source
            # Tekton workspace is owned by tekton's UID; alpine/git runs
            # as a different UID, hitting "dubious ownership" on every
            # git invocation. `git config --global` is unreliable in
            # containers without a writable HOME. Use the `-c` flag and
            # GIT_CONFIG_* env vars to set safe.directory authoritatively.
            export GIT_CONFIG_COUNT=1
            export GIT_CONFIG_KEY_0=safe.directory
            export GIT_CONFIG_VALUE_0=/workspace/source
            echo "==> cloning PR ${REPO_OWNER}/${REPO_NAME}#${PULL_NUMBER} HEAD only"
            git clone --depth=1 "https://github.com/${REPO_OWNER}/${REPO_NAME}.git" .
            git fetch --depth=1 origin "pull/${PULL_NUMBER}/head:pr-head"
            git checkout pr-head
            echo "==> at $(git rev-parse --short HEAD): $(git log -1 --pretty=%s)"
        # leartech-gate image is auto-built by JX release pipeline to Google
        # Artifact Registry. Phase 1 hardening: switch to a versioned tag
        # via Renovate-pinned reference; for the spike, pin to the spike's
        # initial release so the task is reproducible.
        - image: us-central1-docker.pkg.dev/product-first/oci/leartech-gate:0.0.11
          name: qa-gate
          resources: {}
          env:
          # Default path is the JX3 build-cluster shape (gsm + akv production
          # case). Sandbox-style consumers (e.g. leartech-qa-sandbox-gitops)
          # use `helmfiles/staging/helmfile.yaml` and override this env in
          # their own .lighthouse/jenkins-x/qa-gate.yaml — see that repo's
          # `script:` block style for one approach. Note: stepTemplate-level
          # env DOES NOT override step-level env in `uses:` expansion, so a
          # consumer that needs a different path must use `script:` to add
          # an explicit step that runs gate-cli with the path it wants.
          - name: HELMFILE_PATH
            value: helmfiles/jx-staging/helmfile.yaml
          - name: QA_MANAGEMENT_RAW
            value: https://raw.githubusercontent.com/mikelear/leartech-qa-management/main
          - name: RESULT_STORE_BUCKET
            value: test-artifacts-product-first
          - name: RESULT_STORE_PREFIX
            value: results/v1
          # Post-deploy quill (gate-cli ≥0.0.4): reads Arrival CRs from
          # the build cluster's jx-staging namespace via in-cluster K8s
          # API. tekton-bot SA already has cluster-admin, so no extra RBAC.
          - name: WATCH_NAMESPACE
            value: jx-staging
          - name: ENABLE_POST_DEPLOY_QUILL
            value: "true"
          # Post-deploy artifact path template — CONTRACT with arrivals-
          # observer's chart paths.postDeployTemplate (writer side).
          # Renderer: Cluster/Namespace/Service/Version/Pack. Override
          # only when the writer's template diverges per cluster.
          - name: PATHS_POST_DEPLOY_TEMPLATE
            value: "results/v1/post-deploy/{{.Cluster}}/{{.Namespace}}/{{.Service}}/{{.Version}}/{{.Pack}}"
          # Auto-issue creation on service repos when their quill fails
          # (gate-cli ≥0.0.7). Default OFF until validated; flip to "true"
          # in the consumer's `.lighthouse/jenkins-x/qa-gate.yaml` once
          # the team is ready for the per-PR notifications.
          - name: ENABLE_ISSUE_CREATION
            value: "false"
          - name: ISSUE_REPO_OWNER
            value: mikelear
          # gate-cli reads CLUSTER_TAG; mirror CLUSTER_ID from the cluster ConfigMap.
          - name: CLUSTER_TAG
            valueFrom:
              configMapKeyRef:
                name: jx-cluster-config
                key: CLUSTER_ID
                optional: true
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: tekton-git
                key: password
                optional: true
          # distroless/static:nonroot has no shell — use `command:` not `script:`.
          # Binary is at /gate-cli per the gate's Dockerfile. All config flows
          # through env vars (gate-cli's flags fall back to env via envOr).
          command: ["/gate-cli"]
  podTemplate:
    tolerations:
    - key: sku
      operator: Equal
      value: build
      effect: NoSchedule
  serviceAccountName: tekton-bot
  timeout: 5m0s
status: {}
