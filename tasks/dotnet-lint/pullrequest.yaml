apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: dotnet-lint
spec:
  pipelineSpec:
    tasks:
    - name: dotnet-lint
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - image: mcr.microsoft.com/dotnet/sdk:10.0
          name: dotnet-lint
          resources:
            requests:
              cpu: 400m
              memory: 1Gi
          env:
            # GitHub Packages NuGet feed credentials — nuget.config references
            # these as %GITHUB_USER% / %GITHUB_TOKEN%. Without them `dotnet
            # restore` 401s on any Leartech.* / Mqube.* PackageReference.
            # `optional: true` keeps services with only nuget.org deps working.
            - name: GITHUB_USER
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: username
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: password
                  optional: true
          script: |
            #!/bin/bash
            set -e
            apt-get update -qq && apt-get install -y -qq --no-install-recommends \
              git make ca-certificates >/dev/null

            SOLUTION="${BUILD_TARGET:-./*.sln}"

            echo "==> dotnet restore $SOLUTION"
            dotnet restore $SOLUTION --locked-mode

            # `dotnet format --verify-no-changes` exits non-zero if any file
            # would be reformatted. Covers whitespace + style + analyzer
            # auto-fixes (where applicable). Build-time analyzer enforcement
            # via Directory.Build.props (EnforceCodeStyleInBuild +
            # TreatWarningsAsErrors) catches the rest at the build step
            # below.
            echo "==> dotnet format --verify-no-changes (whitespace + style)"
            dotnet format $SOLUTION --verify-no-changes --no-restore

            # Building with TreatWarningsAsErrors=true (set in repo's
            # Directory.Build.props) means analyzer warnings fail the build
            # here. Mqube's services have <NoWarn>1591;NU1605</NoWarn>
            # suppressions; leartech intentionally goes the other way.
            echo "==> dotnet build (analyzer-as-error gate)"
            dotnet build $SOLUTION --no-restore --configuration Debug

            echo "==> lint complete"
  podTemplate:
    tolerations:
    - key: sku
      operator: Equal
      value: build
      effect: NoSchedule
  serviceAccountName: tekton-bot
  timeout: 30m0s
status: {}
