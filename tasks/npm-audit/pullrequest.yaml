# npm audit presubmit — vulnerability check equivalent to govulncheck.
#
# Runs `npm audit --audit-level=${AUDIT_LEVEL}`. Default is `critical`
# because the npm ecosystem generates enough HIGH transitive noise that
# a HIGH default blocks legitimate PRs on dep graphs the service doesn't
# actually use. Consumers that want stricter gating raise this to `high`.
#
# Consumer-overridable via env:
#   AUDIT_LEVEL  low | moderate | high | critical  (default: critical)
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: npm-audit
spec:
  pipelineSpec:
    tasks:
    - name: npm-audit
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          resources:
            requests:
              cpu: 400m
              memory: 1Gi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - image: node:22-alpine
          name: npm-audit
          resources: {}
          script: |
            #!/bin/sh
            set -e
            apk add --no-cache git
            AUDIT_LEVEL="${AUDIT_LEVEL:-critical}"
            echo "==> npm audit --audit-level=$AUDIT_LEVEL"
            npm audit --audit-level="$AUDIT_LEVEL"
  podTemplate: {}
  serviceAccountName: tekton-bot
  timeout: 15m0s
status: {}
