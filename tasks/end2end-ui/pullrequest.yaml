# end2end-ui presubmit — headless browser tests against the live preview.
#
# ── CONTRACT FOR CONSUMERS ────────────────────────────────────────────
#
# Missing: if the consumer repo has no end2end-ui/ directory, this task
# posts a friendly "not configured" sticky comment and passes.
# Adoption is opt-in per repo.
#
# Present: the task installs Playwright + Chromium, waits for the preview
# to respond 200 on the health endpoint, then runs
# `npx playwright test end2end-ui/` against the live preview URL.
# Results are converted to the same results.json schema as end2end/
# and posted as a sticky PR comment.
#
# ── ENV AVAILABLE TO PLAYWRIGHT SPECS ──────────────────────────────────
#
#   PREVIEW_URL         https://<APP_NAME>-pr-<PULL_NUMBER>.jx.leartech.com
#   PREVIEW_HOST_BASE   pr-<PULL_NUMBER>.jx.leartech.com
#   PREVIEW_NAMESPACE   jx-<REPO_OWNER>-<APP_NAME>-pr-<PULL_NUMBER>
#   APP_NAME, PULL_NUMBER, REPO_OWNER, REPO_NAME, CLUSTER_ID, VERSION
#
# Specs access the preview URL via process.env.PREVIEW_URL.
#
# ── end2end-ui/ DIRECTORY CONVENTION ───────────────────────────────────
#
#   end2end-ui/
#     playwright.config.ts   — Playwright config (baseURL from PREVIEW_URL)
#     *.spec.ts              — test specs
#
# The golden Angular template ships with 01-page-loads.spec.ts as a
# smoke test. Consumers add app-specific specs.
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: end2end-ui
spec:
  pipelineSpec:
    tasks:
    - name: end2end-ui
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          - name: GIT_TOKEN
            valueFrom:
              secretKeyRef:
                name: tekton-git
                key: password
                optional: true
          - name: CLUSTER_ID
            valueFrom:
              configMapKeyRef:
                name: jx-cluster-config
                key: CLUSTER_ID
                optional: true
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
          workingDir: /workspace/source
        volumes:
        - name: gcs-key
          secret:
            secretName: test-artifacts-gcs-key
            optional: true
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - image: ghcr.io/jenkins-x/jx-boot:3.16.59
          name: jx-variables
          resources: {}
          script: |
            #!/usr/bin/env sh
            jx gitops variables
        # Pre-baked Playwright + Chromium + Firefox + WebKit + gcloud SDK +
        # bcrypt baked in via leartech-dockerfiles/playwright-runner. Used to
        # be node:22 with 2-5 min of inline tool install per pipeline run;
        # this image drops that to ~10s of consumer-side npm ci.
        # See ~/leartech/hub/shared-rules/build-speed.md.
        - image: ghcr.io/mikelear/playwright-runner:0.22.0
          name: end2end-ui
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
          - name: gcs-key
            mountPath: /var/run/secrets/test-artifacts
            readOnly: true
          script: |
            #!/bin/bash
            set -eo pipefail

            # Tools (ca-certificates, curl, jq, python3, bcrypt, gcloud SDK)
            # are pre-installed in the playwright-runner image. No apt-get
            # needed at runtime.

            source .jx/variables.sh

            # DOMAIN from .jx/variables.sh is cluster-specific (jx.leartech.com
            # on GCP, az.leartech.com on Azure). Preview helmfiles use
            # jxRequirements.ingress.domain which matches.
            # namespaceSubDomain is "-prN." (no hyphen — mqube pattern).
            export PREVIEW_HOST_BASE="${PREVIEW_HOST_BASE:-pr${PULL_NUMBER}.${DOMAIN}}"
            : "${PREVIEW_URL:=https://${APP_NAME}-${PREVIEW_HOST_BASE}}"
            export PREVIEW_URL
            export PREVIEW_NAMESPACE="${PREVIEW_NAMESPACE:-jx-${REPO_OWNER}-${APP_NAME}-pr-${PULL_NUMBER}}"

            CLUSTER_TAG="${CLUSTER_ID:-unknown}"
            MARKER="<!-- leartech-end2end-ui-${CLUSTER_TAG} -->"

            echo "==> consumer env:"
            echo "    PREVIEW_URL=$PREVIEW_URL"
            echo "    PREVIEW_NAMESPACE=$PREVIEW_NAMESPACE"
            echo "    APP_NAME=$APP_NAME  PULL_NUMBER=$PULL_NUMBER  CLUSTER_ID=${CLUSTER_ID:-}"

            # ── Helper: post/update sticky PR comment ───────────────────
            post_sticky() {
              local body="$1"
              if [ -z "$GIT_TOKEN" ] || [ -z "$REPO_OWNER" ] || [ -z "$REPO_NAME" ] || [ -z "$PULL_NUMBER" ]; then
                echo "(skipping PR comment — missing env)"
                return
              fi
              local api="https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${PULL_NUMBER}/comments"
              local existing
              existing=$(curl -sS -H "Authorization: token ${GIT_TOKEN}" "$api" \
                | jq -r ".[] | select(.body | startswith(\"${MARKER}\")) | .id" | head -1)
              if [ -n "$existing" ]; then
                curl -sS -X PATCH -H "Authorization: token ${GIT_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "$(jq -n --arg b "$body" '{body: $b}')" \
                  "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/comments/${existing}" >/dev/null
                echo "==> updating existing end2end-ui [$CLUSTER_TAG] comment $existing"
              else
                curl -sS -X POST -H "Authorization: token ${GIT_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "$(jq -n --arg b "$body" '{body: $b}')" "$api" >/dev/null
                echo "==> posting new end2end-ui [$CLUSTER_TAG] comment"
              fi
            }

            # ── Check if end2end-ui/ exists ─────────────────────────────
            if [ ! -d "end2end-ui" ] || [ -z "$(ls end2end-ui/*.spec.ts 2>/dev/null)" ]; then
              echo "==> no end2end-ui/ specs found — skipping"
              post_sticky "$(printf '%s\n' "$MARKER" ":grey_question: **End-to-end UI: not configured** \`[$CLUSTER_TAG]\`" "" "No \`end2end-ui/*.spec.ts\` files found. Add Playwright specs to enable browser testing." "" "_Posted by \`tasks/end2end-ui/pullrequest.yaml\`._")"
              echo "PASS: end2end-ui not configured (opt-in)"
              exit 0
            fi

            # ── Wait for preview ────────────────────────────────────────
            HEALTH_PATH="${END2END_HEALTH_PATH:-/health/live}"
            MAX_WAIT="${END2END_HEALTH_TIMEOUT:-600}"
            DEADLINE=$(( $(date +%s) + MAX_WAIT ))

            # Prefer preview-gate if deployed (checks all pods, stability, version).
            # Retry detection for up to 60s — gate pod may still be starting
            # (end2end-ui often starts before the pr build deploys the preview).
            GATE_URL="http://preview-gate.${PREVIEW_NAMESPACE}.svc.cluster.local:8090/cgi-bin/gate"
            USE_GATE=false
            GATE_DETECT_DEADLINE=$(( $(date +%s) + 60 ))
            echo "==> looking for preview-gate at $GATE_URL (up to 60s)"
            while [ "$(date +%s)" -lt "$GATE_DETECT_DEADLINE" ]; do
              if curl -sSf -o /dev/null -m 3 "$GATE_URL" 2>/dev/null || \
                 curl -sS -o /dev/null -w '%{http_code}' -m 3 "$GATE_URL" 2>/dev/null | grep -q "503"; then
                USE_GATE=true
                echo "==> preview-gate detected — using gate for readiness"
                break
              fi
              sleep 5
            done
            if [ "$USE_GATE" = "false" ]; then
              echo "==> preview-gate not found after 60s — falling back to direct health probe"
            fi

            if [ "$USE_GATE" = "true" ]; then
              echo "==> waiting up to $((MAX_WAIT / 60)) min for gate to report ready"
              while true; do
                if curl -sSf -o /dev/null -m 5 "$GATE_URL" 2>/dev/null; then
                  echo "==> gate reports READY"
                  curl -sS -m 5 "$GATE_URL" 2>/dev/null | jq . || true
                  break
                fi
                if [ "$(date +%s)" -ge "$DEADLINE" ]; then
                  echo "==> gate detail at timeout:"
                  curl -sS -m 5 "$GATE_URL" 2>/dev/null || true
                  post_sticky "$(printf '%s\n' "$MARKER" ":x: **End-to-end UI: FAIL (preview gate timeout)** \`[$CLUSTER_TAG]\`" "" "preview-gate never reported ready within $((MAX_WAIT / 60)) min." "" "_Posted by \`tasks/end2end-ui/pullrequest.yaml\`._")"
                  echo "FAIL: preview gate timeout"
                  exit 1
                fi
                sleep 5
              done
            else
              echo "==> waiting up to $((MAX_WAIT / 60)) min for ${PREVIEW_URL}${HEALTH_PATH} (3 consecutive 200s)"
              STREAK=0
              REQUIRED=3
              while [ "$STREAK" -lt "$REQUIRED" ]; do
                if curl -sSf -o /dev/null -m 5 "${PREVIEW_URL}${HEALTH_PATH}" 2>/dev/null; then
                  STREAK=$((STREAK + 1))
                  echo "   probe $STREAK/$REQUIRED ok"
                else
                  STREAK=0
                fi
                if [ "$STREAK" -lt "$REQUIRED" ]; then
                  if [ "$(date +%s)" -ge "$DEADLINE" ]; then
                    post_sticky "$(printf '%s\n' "$MARKER" ":x: **End-to-end UI: FAIL (preview not ready)** \`[$CLUSTER_TAG]\`" "" "\`${PREVIEW_URL}${HEALTH_PATH}\` never returned 3 consecutive 200s within $((MAX_WAIT / 60)) min." "" "_Posted by \`tasks/end2end-ui/pullrequest.yaml\`._")"
                    echo "FAIL: preview never reached stable ready state"
                    exit 1
                  fi
                  sleep 5
                fi
              done
            fi

            # ── Seed test data (if end2end/ scripts exist) ───────────────
            # Run seed scripts so the preview has OAuth client + test user.
            # Same scripts as the bash end2end task — both tasks should be
            # independently able to seed, since they run in parallel.
            if [ -d "end2end" ]; then
              for seed in end2end/0[0-9]-*.sh; do
                [ -f "$seed" ] || continue
                echo "==> seeding: $(basename "$seed")"
                bash "$seed" 2>&1 | tail -3 || echo "   (seed script exited non-zero — continuing)"
              done
            fi

            # ── Playwright + Chromium ───────────────────────────────────
            # Pre-installed in the playwright-runner image. Consumer's own
            # npx playwright test invocation below resolves @playwright/test
            # via the image's global node_modules. Browsers cached at
            # /ms-playwright (Microsoft's standard location).

            # ── Re-seed RIGHT BEFORE Playwright runs ────────────────────
            # Hydra in previews uses emptyDir-backed sqlite. If anything
            # rolled the deployment between the first seed (above) and
            # now (helmfile re-apply, image bump, hpa scale, anything),
            # the new pod has fresh-empty sqlite and the OAuth2 client
            # registration is lost — Playwright then fails with
            # `invalid_client`. The seeds are idempotent (HTTP 409 = OK),
            # so running again here costs ~1s and closes the window.
            #
            # Only re-runs scripts named 0[1-9]-*.sh that look like Hydra
            # registration / user setup — skips long-running flow tests
            # the bash end2end task does.
            if [ -d "end2end" ]; then
              echo "==> re-seeding hydra/test-user before Playwright (idempotent)"
              for seed in end2end/0[1-9]-*.sh; do
                [ -f "$seed" ] || continue
                name=$(basename "$seed")
                # Skip flow-tests; only re-run the registrations/setups.
                case "$name" in
                  *register*|*seed*|*setup*) ;;
                  *) continue ;;
                esac
                echo "==> re-seed: $name"
                bash "$seed" 2>&1 | tail -3 || echo "   (re-seed exited non-zero — continuing)"
              done
            fi

            # ── Run specs ───────────────────────────────────────────────
            echo "==> running Playwright specs from end2end-ui/"
            RESULTS_JSON="end2end-ui/results.json"

            npx playwright test \
              --config end2end-ui/playwright.config.ts \
              --reporter=list \
              --output end2end-ui/test-results \
              2>&1 | tee end2end-ui/playwright.log || true

            # Parse playwright summary line: "3 passed (3.3s)" / "1 failed"
            PASSED=$(grep -oE "[0-9]+ passed" end2end-ui/playwright.log 2>/dev/null | head -1 | grep -oE "[0-9]+" || echo 0)
            FAILED=$(grep -oE "[0-9]+ failed" end2end-ui/playwright.log 2>/dev/null | head -1 | grep -oE "[0-9]+" || echo 0)
            TOTAL=$((PASSED + FAILED))
            [ "$TOTAL" -eq 0 ] && TOTAL=1 && FAILED=1

            if [ "$FAILED" -eq 0 ]; then
              SUCCESS=true
              ICON="white_check_mark"
              VERDICT="PASS"
            else
              SUCCESS=false
              ICON="x"
              VERDICT="FAIL"
            fi
            SUMMARY="${PASSED}/${TOTAL} browser tests passed"

            # ── Upload artifacts to GCS ─────────────────────────────────
            BUCKET="${TEST_ARTIFACTS_BUCKET:-test-artifacts-product-first}"
            ARTIFACT_PREFIX="${REPO_NAME}/pr-${PULL_NUMBER}/${CLUSTER_TAG}/$(date +%s)"
            ARTIFACT_BASE_URL="https://storage.googleapis.com/${BUCKET}/${ARTIFACT_PREFIX}"
            ARTIFACT_LINKS=""

            # gsutil is pre-installed in the playwright-runner image via the
            # gcloud SDK. The check below is kept for forward-compat —
            # consumers can override the image and the install fallback
            # gracefully degrades.
            HAS_GSUTIL=false
            if command -v gsutil >/dev/null 2>&1; then
              HAS_GSUTIL=true
            else
              echo "==> gsutil not found in image, skipping artifact upload"
            fi

            # Auth with SA key from K8s secret (mounted by ExternalSecret)
            GCS_KEY_FILE="/tmp/gcs-key.json"
            if [ -f "/var/run/secrets/test-artifacts/key.json" ]; then
              cp /var/run/secrets/test-artifacts/key.json "$GCS_KEY_FILE"
              gsutil -o "Credentials:gs_service_key_file=${GCS_KEY_FILE}" ls gs://${BUCKET}/ >/dev/null 2>&1 && echo "==> GCS auth OK" || echo "==> GCS auth failed"
            elif kubectl get secret test-artifacts-gcs-key -n jx -o jsonpath='{.data.key\.json}' 2>/dev/null | base64 -d > "$GCS_KEY_FILE" 2>/dev/null && [ -s "$GCS_KEY_FILE" ]; then
              echo "==> GCS key from kubectl secret"
            else
              echo "==> no GCS key available, skipping artifact upload"
              HAS_GSUTIL=false
            fi
            export BOTO_CONFIG=/dev/null

            if [ "$HAS_GSUTIL" = "true" ] && [ -d "end2end-ui/test-results" ]; then
              echo "==> uploading test artifacts to gs://${BUCKET}/${ARTIFACT_PREFIX}/"

              # Upload all artifacts preserving test-name prefix for uniqueness.
              # Directory structure: test-results/<test-name>/{screenshot,video,trace}
              # Upload as: <test-name>--<filename> so each file is unique + identifiable.
              for dir in end2end-ui/test-results/*/; do
                [ -d "$dir" ] || continue
                testname=$(basename "$dir")
                for artifact in "$dir"*.png "$dir"*.webm "$dir"*.zip; do
                  [ -f "$artifact" ] || continue
                  fname="${testname}--$(basename "$artifact")"
                  gsutil -o "Credentials:gs_service_key_file=${GCS_KEY_FILE}" -q cp "$artifact" "gs://${BUCKET}/${ARTIFACT_PREFIX}/${fname}" 2>/dev/null || true
                  # Group by type with emoji for readability
                  case "$artifact" in
                    *.png)  ARTIFACT_LINKS="${ARTIFACT_LINKS}\n- :camera: [${testname} screenshot](${ARTIFACT_BASE_URL}/${fname})" ;;
                    *.webm) ARTIFACT_LINKS="${ARTIFACT_LINKS}\n- :movie_camera: [${testname} video](${ARTIFACT_BASE_URL}/${fname})" ;;
                    *.zip)  ARTIFACT_LINKS="${ARTIFACT_LINKS}\n- :mag: [${testname} trace](${ARTIFACT_BASE_URL}/${fname})" ;;
                  esac
                done
              done

              if [ -n "$ARTIFACT_LINKS" ]; then
                echo "==> artifacts uploaded"
              else
                echo "==> no artifacts to upload"
              fi
            else
              echo "==> gsutil not available, skipping artifact upload"
            fi

            # Build results.json
            jq -n \
              --argjson success "$SUCCESS" \
              --arg summary "$SUMMARY" \
              --arg preview_url "$PREVIEW_URL" \
              --arg version "${VERSION:-}" \
              --arg artifacts_url "${ARTIFACT_BASE_URL}" \
              '{
                success: $success,
                summary: $summary,
                tests: [],
                metadata: { preview_url: $preview_url, version: $version, artifacts_url: $artifacts_url }
              }' > "$RESULTS_JSON"

            echo "==> $RESULTS_JSON:"
            cat "$RESULTS_JSON"

            # ── Post sticky comment ─────────────────────────────────────
            LOG_TAIL=$(tail -20 end2end-ui/playwright.log 2>/dev/null | head -15)

            ARTIFACTS_SECTION=""
            if [ -n "$ARTIFACT_LINKS" ]; then
              ARTIFACTS_SECTION=$(printf '\n**Artifacts** (screenshots, videos, traces):\n%b\n' "$ARTIFACT_LINKS")
            fi

            post_sticky "$(printf '%s\n' \
              "$MARKER" \
              ":${ICON}: **End-to-end UI: ${VERDICT}** \`[$CLUSTER_TAG]\` — ${SUMMARY}" \
              "" \
              "Preview: ${PREVIEW_URL}" \
              "${ARTIFACTS_SECTION}" \
              '```' \
              "$LOG_TAIL" \
              '```' \
              "" \
              "_Posted by \`tasks/end2end-ui/pullrequest.yaml\`._")"

            if [ "$SUCCESS" = "true" ]; then
              echo "PASS: end2end-ui complete"
            else
              echo "FAIL: end2end-ui results.success != true"
              exit 1
            fi
  podTemplate:
    tolerations:
    - key: sku
      operator: Equal
      value: build
      effect: NoSchedule
  serviceAccountName: tekton-bot
  timeout: 30m0s
status: {}
