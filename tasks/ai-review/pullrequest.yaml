apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: ai-code-review
spec:
  pipelineSpec:
    tasks:
    - name: ai-review
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          name: ""
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - image: us-central1-docker.pkg.dev/product-first/oci/ai-review-worker:latest
          name: ai-review
          env:
            - name: CLAUDE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-review-api-keys
                  key: CLAUDE_API_KEY
                  optional: true
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-review-api-keys
                  key: DEEPSEEK_API_KEY
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-review-api-keys
                  key: GITHUB_TOKEN
                  optional: true
            - name: GIT_USER
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: username
                  optional: true
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: password
                  optional: true
            - name: OLLAMA_ENDPOINT
              value: "http://ollama.ai-inference.svc.cluster.local:11434"
            - name: CHROMADB_ENDPOINT
              value: "http://ai-inference-resources-chromadb.ai-inference.svc.cluster.local:8000"
            - name: OLLAMA_MODEL
              value: "qwen2.5-coder:14b"
          script: |
            #!/bin/sh
            echo "AI Code Review for $REPO_OWNER/$REPO_NAME PR #$PULL_NUMBER"

            # Fetch PR diff
            python3 /app/fetch_diff.py \
              --owner "$REPO_OWNER" \
              --repo "$REPO_NAME" \
              --pr "$PULL_NUMBER" \
              --output /tmp/diff.txt

            # Query ChromaDB for similar past reviews (RAG)
            python3 /app/rag_query.py \
              --chromadb-url "$CHROMADB_ENDPOINT" \
              --collection code-reviews \
              --diff /tmp/diff.txt \
              --output /tmp/rag-context.txt || true

            # Review with available LLMs (each call is tolerant of failures)

            # Ollama (skip if not reachable)
            if curl -s --max-time 5 "$OLLAMA_ENDPOINT/api/tags" >/dev/null 2>&1; then
              python3 /app/review.py \
                --provider ollama \
                --endpoint "$OLLAMA_ENDPOINT" \
                --model "$OLLAMA_MODEL" \
                --diff /tmp/diff.txt \
                --rag-context /tmp/rag-context.txt \
                --output /tmp/review-ollama.json || echo "Ollama review failed"
            else
              echo "Ollama not reachable, skipping"
            fi

            # Claude
            if [ -n "$CLAUDE_API_KEY" ]; then
              python3 /app/review.py \
                --provider claude \
                --endpoint "https://api.anthropic.com/v1/messages" \
                --model "claude-sonnet-4-20250514" \
                --diff /tmp/diff.txt \
                --rag-context /tmp/rag-context.txt \
                --output /tmp/review-claude.json || echo "Claude review failed"
            else
              echo "No CLAUDE_API_KEY, skipping"
            fi

            # DeepSeek
            if [ -n "$DEEPSEEK_API_KEY" ]; then
              python3 /app/review.py \
                --provider deepseek \
                --endpoint "https://api.deepseek.com/v1/chat/completions" \
                --model "deepseek-chat" \
                --diff /tmp/diff.txt \
                --rag-context /tmp/rag-context.txt \
                --output /tmp/review-deepseek.json || echo "DeepSeek review failed"
            else
              echo "No DEEPSEEK_API_KEY, skipping"
            fi

            # Collect only successfully created review files
            REVIEWS=""
            for f in /tmp/review-ollama.json /tmp/review-claude.json /tmp/review-deepseek.json; do
              [ -f "$f" ] && REVIEWS="$REVIEWS $f"
            done
            REVIEWS=$(echo $REVIEWS | xargs)
            REVIEW_COUNT=$(echo $REVIEWS | wc -w | tr -d ' ')
            echo "Got $REVIEW_COUNT successful reviews"

            if [ "$REVIEW_COUNT" -eq 0 ]; then
              echo "No LLM reviews available, skipping"
              exit 0
            fi

            # Aggregate
            REVIEW_LIST=$(echo $REVIEWS | tr ' ' ',')
            python3 /app/aggregate.py \
              --reviews "$REVIEW_LIST" \
              --threshold "$REVIEW_COUNT" \
              --output /tmp/aggregate-result.json

            # Post to PR
            python3 /app/post_review.py \
              --owner "$REPO_OWNER" \
              --repo "$REPO_NAME" \
              --pr "$PULL_NUMBER" \
              --sha "$PULL_PULL_SHA" \
              --result /tmp/aggregate-result.json

            # Capture review data for training (always, not just on override)
            python3 /app/feedback.py \
              --mode auto-capture \
              --owner "$REPO_OWNER" \
              --repo "$REPO_NAME" \
              --pr "$PULL_NUMBER" \
              --result /tmp/aggregate-result.json \
              --diff /tmp/diff.txt \
              --chromadb-url "$CHROMADB_ENDPOINT" \
              --collection code-reviews \
              --feedback-repo "https://github.com/mikelear/leartech-llm-training-data.git" || echo "WARNING: auto-capture failed (non-blocking)"

            # Process any /ai-feedback comments on this PR
            python3 /app/feedback.py \
              --mode comment-feedback \
              --owner "$REPO_OWNER" \
              --repo "$REPO_NAME" \
              --pr "$PULL_NUMBER" \
              --chromadb-url "$CHROMADB_ENDPOINT" \
              --collection code-reviews \
              --feedback-repo "https://github.com/mikelear/leartech-llm-training-data.git" || echo "WARNING: comment-feedback failed (non-blocking)"

            # Exit with failure if AI review verdict is FAIL
            # This makes the ai-review check show as failed on the PR
            VERDICT=$(python3 -c "import json; print(json.load(open('/tmp/aggregate-result.json'))['overall_verdict'])")
            echo "Final verdict: $VERDICT"
            if [ "$VERDICT" = "FAIL" ]; then
              echo "AI review FAILED — PR needs attention"
              exit 1
            elif [ "$VERDICT" = "ERROR" ]; then
              echo "AI review had errors — check logs"
              exit 1
            fi
  podTemplate: {}
  serviceAccountName: tekton-bot
  timeout: 30m0s
status: {}
