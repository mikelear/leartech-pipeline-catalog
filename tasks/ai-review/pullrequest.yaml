apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: ai-code-review
spec:
  pipelineSpec:
    tasks:
    - name: ai-review
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          name: ""
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - image: ghcr.io/mikelear/ai-review-worker:latest
          name: ai-review
          env:
            - name: CLAUDE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-review-api-keys
                  key: CLAUDE_API_KEY
                  optional: true
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-review-api-keys
                  key: DEEPSEEK_API_KEY
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-review-api-keys
                  key: GITHUB_TOKEN
                  optional: true
            - name: GIT_USER
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: username
                  optional: true
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: password
                  optional: true
            - name: OLLAMA_ENDPOINT
              value: "http://ollama.ai-inference.svc.cluster.local:11434"
            - name: CHROMADB_ENDPOINT
              value: "http://ai-inference-resources-chromadb.ai-inference.svc.cluster.local:8000"
            - name: OLLAMA_MODEL
              value: "qwen2.5-coder:14b"
            - name: CLUSTER_ID
              valueFrom:
                configMapKeyRef:
                  name: ai-review-cluster-config
                  key: CLUSTER_ID
                  optional: true
          script: |
            #!/bin/sh
            set -e
            # Optional API-key env vars (CLAUDE_API_KEY, DEEPSEEK_API_KEY) may be unset — `set -u` would
            # break the `[ -n "$VAR" ]` guards, so we use `set -e` only.
            # Steps that are intentionally non-blocking use `|| true` (RAG, auto-capture).
            echo "AI Code Review for $REPO_OWNER/$REPO_NAME PR #$PULL_NUMBER"

            # Clone standards repo for review context
            echo "Cloning standards repo..."
            git clone --depth 1 https://${GIT_USER}:${GIT_TOKEN}@github.com/mikelear/leartech-llm-training-data.git /tmp/standards 2>/dev/null || echo "WARNING: Failed to clone standards repo"

            # Fetch PR diff
            python3 /app/fetch_diff.py \
              --owner "$REPO_OWNER" \
              --repo "$REPO_NAME" \
              --pr "$PULL_NUMBER" \
              --output /tmp/diff-raw.txt

            # Filter diff using .reviewignore and handle empty diffs
            python3 /app/filter_diff.py /tmp/diff-raw.txt /tmp/diff.txt /workspace/source/.reviewignore /tmp/standards/.reviewignore || cp /tmp/diff-raw.txt /tmp/diff.txt

            if [ ! -s /tmp/diff.txt ]; then
              echo "No reviewable changes in diff (empty or all filtered)"
              exit 0
            fi

            # Query ChromaDB for similar past reviews (RAG)
            python3 /app/rag_query.py \
              --chromadb-url "$CHROMADB_ENDPOINT" \
              --collection code-reviews \
              --diff /tmp/diff.txt \
              --output /tmp/rag-context.txt || true

            # Review with available LLMs (each call is tolerant of failures)

            # Ollama (skip if not reachable — use Python since curl may not be in image)
            if python3 -c "import httpx; httpx.get('$OLLAMA_ENDPOINT/api/tags', timeout=5)" 2>/dev/null; then
              python3 /app/review.py \
                --provider ollama \
                --endpoint "$OLLAMA_ENDPOINT" \
                --model "$OLLAMA_MODEL" \
                --diff /tmp/diff.txt \
                --rag-context /tmp/rag-context.txt \
                --standards-dir /tmp/standards \
                --output /tmp/review-ollama.json || echo "Ollama review failed"
            else
              echo "Ollama not reachable, skipping"
            fi

            # Claude
            if [ -n "$CLAUDE_API_KEY" ]; then
              python3 /app/review.py \
                --provider claude \
                --endpoint "https://api.anthropic.com/v1/messages" \
                --model "claude-sonnet-4-20250514" \
                --diff /tmp/diff.txt \
                --rag-context /tmp/rag-context.txt \
                --standards-dir /tmp/standards \
                --output /tmp/review-claude.json || echo "Claude review failed"
            else
              echo "No CLAUDE_API_KEY, skipping"
            fi

            # DeepSeek
            if [ -n "$DEEPSEEK_API_KEY" ]; then
              python3 /app/review.py \
                --provider deepseek \
                --endpoint "https://api.deepseek.com/v1/chat/completions" \
                --model "deepseek-chat" \
                --diff /tmp/diff.txt \
                --rag-context /tmp/rag-context.txt \
                --standards-dir /tmp/standards \
                --output /tmp/review-deepseek.json || echo "DeepSeek review failed"
            else
              echo "No DEEPSEEK_API_KEY, skipping"
            fi

            # Collect only successfully created review files
            REVIEWS=""
            for f in /tmp/review-ollama.json /tmp/review-claude.json /tmp/review-deepseek.json; do
              [ -f "$f" ] && REVIEWS="$REVIEWS $f"
            done
            REVIEWS=$(echo $REVIEWS | xargs)
            REVIEW_COUNT=$(echo $REVIEWS | wc -w | tr -d ' ')
            echo "Got $REVIEW_COUNT successful reviews"

            if [ "$REVIEW_COUNT" -eq 0 ]; then
              echo "No LLM reviews available, skipping"
              exit 0
            fi

            # Aggregate (pass diff for hallucination validation)
            REVIEW_LIST=$(echo $REVIEWS | tr ' ' ',')
            python3 /app/aggregate.py \
              --reviews "$REVIEW_LIST" \
              --threshold "$REVIEW_COUNT" \
              --diff /tmp/diff.txt \
              --output /tmp/aggregate-result.json

            # Post to PR
            python3 /app/post_review.py \
              --owner "$REPO_OWNER" \
              --repo "$REPO_NAME" \
              --pr "$PULL_NUMBER" \
              --sha "$PULL_PULL_SHA" \
              --result /tmp/aggregate-result.json

            # Capture review data for training (always, not just on override)
            python3 /app/feedback.py \
              --mode auto-capture \
              --owner "$REPO_OWNER" \
              --repo "$REPO_NAME" \
              --pr "$PULL_NUMBER" \
              --result /tmp/aggregate-result.json \
              --diff /tmp/diff.txt \
              --chromadb-url "$CHROMADB_ENDPOINT" \
              --collection code-reviews \
              --feedback-repo "https://github.com/mikelear/leartech-llm-training-data.git" || echo "WARNING: auto-capture failed (non-blocking)"

            # NOTE: /ai-feedback comment processing is handled by the dedicated
            # feedback trigger (ai-review/feedback.yaml) — NOT here. Running it
            # in every review caused 3x duplicate ack comments (2 clusters + reruns).

            # Exit with failure if score below threshold.
            # set -eu guarantees these commands hard-fail if /tmp/aggregate-result.json is missing or malformed.
            if [ ! -f /tmp/aggregate-result.json ]; then
              echo "ERROR: aggregate-result.json missing — earlier step failed silently"
              exit 1
            fi
            python3 -c "import json,sys; r=json.load(open('/tmp/aggregate-result.json')); print(f\"Final: {r['overall_score']}/100 {r['overall_verdict']}\"); sys.exit(1 if r['overall_verdict'] in ('FAIL','ERROR') else 0)"
  podTemplate:
    tolerations:
    - key: sku
      operator: Equal
      value: build
      effect: NoSchedule
  serviceAccountName: tekton-bot
  timeout: 30m0s
status: {}
