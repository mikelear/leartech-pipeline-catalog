apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: go-lint
spec:
  pipelineSpec:
    tasks:
    - name: go-lint
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - image: golangci/golangci-lint:v1.64.8-alpine
          name: golangci-lint
          resources: {}
          script: |
            #!/bin/sh
            set -e
            # The golangci-lint alpine image is built with a specific Go version.
            # v1.64.8-alpine uses Go 1.24, which handles consumer go.mod declaring
            # `go 1.24.x`. If a consumer bumps to `go 1.25.x` and lint starts
            # reporting "Go language version used to build golangci-lint is lower
            # than the targeted Go version", bump this image pin.
            apk add --no-cache git
            go mod download
            golangci-lint run ./...
  podTemplate: {}
  serviceAccountName: tekton-bot
  timeout: 30m0s
status: {}
