apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: go-lint
spec:
  pipelineSpec:
    tasks:
    - name: go-lint
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - image: golangci/golangci-lint:v1.64.8-alpine
          name: golangci-lint
          resources: {}
          script: |
            #!/bin/sh
            set -eu
            # The golangci-lint alpine image ships with Go 1.24 (v1.64.8-alpine).
            # Bump this pin if consumers move to go 1.25 and lint starts
            # reporting "Go language version used to build golangci-lint is
            # lower than the targeted Go version".
            apk add --no-cache git curl yq

            # Centralised base config lives in leartech-pipeline-catalog.
            # Per-repo .golangci.yml carries only overrides (typically just
            # goimports.local-prefixes). yq deep-merges base ← local so local
            # wins on any conflicts. Falls back to base-only if the repo
            # hasn't added an override file.
            BASE_URL="https://raw.githubusercontent.com/mikelear/leartech-pipeline-catalog/main/go/.golangci.base.yml"
            echo "==> fetching base config from $BASE_URL"
            curl -fsSL -o /tmp/golangci.base.yml "$BASE_URL"
            echo "==> base config fetched ($(wc -l < /tmp/golangci.base.yml) lines)"

            if [ -f .golangci.yml ]; then
              echo "==> merging local .golangci.yml ($(wc -l < .golangci.yml) lines) onto base"
              yq eval-all '. as $item ireduce ({}; . *+ $item)' /tmp/golangci.base.yml .golangci.yml > /tmp/golangci.merged.yml
            else
              echo "==> no local .golangci.yml; using base as-is"
              cp /tmp/golangci.base.yml /tmp/golangci.merged.yml
            fi
            echo "==> merged config ($(wc -l < /tmp/golangci.merged.yml) lines):"
            cat /tmp/golangci.merged.yml
            echo "==> end merged config"

            echo "==> go mod download"
            go mod download

            echo "==> golangci-lint run -v"
            golangci-lint run -v --config /tmp/golangci.merged.yml ./...
            echo "==> lint complete"
  podTemplate: {}
  serviceAccountName: tekton-bot
  timeout: 30m0s
status: {}
