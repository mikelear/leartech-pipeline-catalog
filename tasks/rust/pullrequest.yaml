apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: pullrequest
spec:
  pipelineSpec:
    tasks:
    - name: from-build-pack
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          # Pod-level scheduling = sum of step container requests; keep modest.
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone-pr.yaml@versionStream
          name: ""
          resources: {}
        - image: ghcr.io/jenkins-x/jx-boot:3.16.59
          name: jx-variables
          resources: {}
          script: |
            #!/usr/bin/env sh
            jx gitops variables
        # rust:1.88-slim-bookworm — switch to leartech-rust-runtime:<semver>
        # once that image is published (PR mikelear/leartech-dockerfiles#15).
        - image: rust:1.88-slim-bookworm
          name: build-cargo-build
          resources:
            requests:
              cpu: 400m
              memory: 1Gi
          script: |
            #!/bin/bash
            set -e
            apt-get update -qq && apt-get install -y -qq --no-install-recommends \
              git make pkg-config libssl-dev libpq-dev build-essential >/dev/null
            # Optional Makefile hook: services that ship a `gen-openapi`
            # binary expose an `openapi:` target so the spec stays fresh
            # alongside the just-built code. Mirrors the go task's
            # `make swag` hook. Non-fatal: if there's no Makefile or no
            # `openapi:` target, just skip.
            [ -f Makefile ] && grep -q "^openapi:" Makefile && make openapi || true
            # Debug build for PR (release optimisations live in release.yaml).
            # BUILD_TARGET lets monorepos point cargo at a non-default crate.
            cargo build --locked ${BUILD_TARGET:+--package $BUILD_TARGET}
        - image: gcr.io/kaniko-project/executor:v1.9.1-debug
          name: build-container-build
          resources: {}
          env:
            # GIT_TOKEN gets passed as a kaniko build-arg so the Dockerfile
            # can configure git credentials inside the builder stage to
            # fetch private cargo deps (e.g. leartech-common via git+tag).
            - name: GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tekton-git
                  key: password
                  optional: true
          script: |
            #!/busybox/sh
            source .jx/variables.sh
            cp /tekton/creds/.docker/config.json /kaniko/.docker/config.json
            # Layer cache shared with release builds — PR snapshots warm the
            # cache for the eventual release build of the merged commit.
            /kaniko/executor $KANIKO_FLAGS \
              --cache=true \
              --cache-repo="$PUSH_CONTAINER_REGISTRY/$DOCKER_REGISTRY_ORG/kaniko-cache" \
              --cache-ttl=168h \
              --build-arg "GIT_TOKEN=${GIT_TOKEN}" \
              --context=/workspace/source \
              --dockerfile="${DOCKERFILE_PATH:-Dockerfile}" \
              --destination="$PUSH_CONTAINER_REGISTRY/$DOCKER_REGISTRY_ORG/$APP_NAME:$VERSION"
        - image: ghcr.io/jenkins-x/jx-boot:3.16.59
          name: promote-jx-preview
          resources: {}
          script: |
            #!/usr/bin/env sh
            set -e
            source .jx/variables.sh
            jx preview create
  podTemplate:
    tolerations:
    - key: sku
      operator: Equal
      value: build
      effect: NoSchedule
  serviceAccountName: tekton-bot
  timeout: 2h0m0s
status: {}
