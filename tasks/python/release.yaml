# Python release orchestrator. Composes language-agnostic release/* steps
# with the Python build/test stage. Mirrors tasks/angular/release.yaml and
# tasks/go/release.yaml: every step is either a `uses:` reference to a
# reusable task or a single Python-specific script block.
#
# Replaces the upstream jx3-pipeline-catalog python release that lacks the
# leartech cluster-suffix tag pattern. Symptom that prompted this composite:
# automated-agent + ai-classifier tags collide when both clusters compute
# the same version simultaneously (PR merged at 08:51:55Z → AZ release at
# 08:52:00Z pushes v0.9.0 → GCP release at 08:52:02Z fails to push v0.9.0).
#
# Cluster-suffix-aware `next-version` (this catalog) computes v0.9.0-az on AZ
# and v0.9.0-gcp on GCP from independent tag sequences — no race, no collision.
#
# Adopting repos: ai-classifier (Python gold-standard FastAPI service),
# automated-agent (FastAPI service cloned from ai-classifier). Future Python
# services should clone leartech-ai-classifier and inherit this pipeline.
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: release
spec:
  pipelineSpec:
    tasks:
    - name: from-build-pack
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          envFrom:
          - secretRef:
              name: jx-boot-job-env-vars
              optional: true
          name: ""
          # Pod-level scheduling = sum of all step containers. Keep modest
          # so the pod fits on a standard AKS/GKE node.
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone.yaml@versionStream
          name: ""
          resources: {}
        - image: uses:mikelear/leartech-pipeline-catalog/tasks/release/next-version.yaml@main
          name: ""
          resources: {}
        - image: ghcr.io/jenkins-x/jx-boot:3.16.59
          name: jx-variables
          resources: {}
          script: |
            #!/usr/bin/env sh
            jx gitops variables
        - image: python:3.13-slim
          name: build-python-test
          resources: {}
          script: |
            #!/bin/sh
            set -e
            pip install uv --quiet
            # Frozen install is preferred; fall back to a fresh resolve if
            # the lockfile lags (e.g. first build after dep bump on main).
            uv sync --dev --frozen --no-cache 2>/dev/null || uv sync --dev --no-cache
            uv run coverage run -m pytest -v
            uv run coverage report
        - image: gcr.io/kaniko-project/executor:v1.9.1-debug
          name: build-container-build
          resources: {}
          script: |
            #!/busybox/sh
            source .jx/variables.sh
            cp /tekton/creds/.docker/config.json /kaniko/.docker/config.json
            # Layer cache: --cache=true reuses identical layers across builds,
            # stored in $PUSH_CONTAINER_REGISTRY/.../kaniko-cache. Major speedup
            # (~50% on incremental builds) since base-image + apt + COPY of
            # uv.lock + .venv stay cached between PRs. --cache-ttl=168h (7d)
            # so layers eventually re-validate. See ~/leartech/hub/shared-rules/build-speed.md.
            /kaniko/executor $KANIKO_FLAGS \
              --cache=true \
              --cache-repo="$PUSH_CONTAINER_REGISTRY/$DOCKER_REGISTRY_ORG/kaniko-cache" \
              --cache-ttl=168h \
              --context=/workspace/source \
              --dockerfile="${DOCKERFILE_PATH:-Dockerfile}" \
              --destination="$PUSH_CONTAINER_REGISTRY/$DOCKER_REGISTRY_ORG/$APP_NAME:$VERSION"
        - image: uses:mikelear/leartech-pipeline-catalog/tasks/release/promote-cluster-suffixed.yaml@main
          name: ""
          resources: {}
        - image: uses:mikelear/leartech-pipeline-catalog/tasks/release/helm-release.yaml@main
          name: ""
          resources: {}
        - image: uses:mikelear/leartech-pipeline-catalog/tasks/release/cosign-sign.yaml@main
          name: ""
          resources: {}
        - image: uses:mikelear/leartech-pipeline-catalog/tasks/release/jx-promote.yaml@main
          name: ""
          resources: {}
  podTemplate:
    tolerations:
    - key: sku
      operator: Equal
      value: build
      effect: NoSchedule
  serviceAccountName: tekton-bot
  timeout: 12h0m0s
status: {}
